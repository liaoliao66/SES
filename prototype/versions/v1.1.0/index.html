<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SES v1.1.0 原型入口</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    .phone {
      width: 390px; height: 844px;
      border: 1px solid #e5e7eb; border-radius: 48px;
      box-shadow: 0 0 20px rgba(0,0,0,0.10);
      background: #0b1220;
      position: relative; overflow: hidden;
    }
    .island {
      position: absolute; top: 14px; left: 50%;
      -webkit-transform: translateX(-50%); transform: translateX(-50%);
      width: 120px; height: 32px; border-radius: 999px;
      background: rgba(0,0,0,0.65);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
      z-index: 20;
    }
    .phone iframe {
      position: absolute; inset: 0; width: 100%; height: 100%;
      border: 0; background: white; border-radius: 48px;
    }
    .mobileLink { -webkit-transition: background 0.15s; transition: background 0.15s; }
    .mobileLink.active {
      outline: 2px solid #94a3b8;
      outline-offset: 0;
      background: #f8fafc;
    }
  </style>
</head>
<body class="bg-gradient-to-b from-slate-50 to-slate-100 text-slate-900 antialiased">
  <div class="max-w-7xl mx-auto px-6 py-10">
    <div class="mb-8">
      <div class="inline-flex items-center gap-2 rounded-2xl px-4 py-2 bg-white shadow text-sm font-semibold">
        SES 安环监测 · v1.1.0
      </div>
      <h1 class="mt-4 text-2xl font-semibold tracking-tight">原型预览入口</h1>
      <p class="mt-2 text-sm text-slate-600 max-w-2xl leading-relaxed">
        <strong>PC端</strong>直接打开页面；<strong>企微H5端</strong>在右侧手机壳内预览（点左侧列表切换）。
      </p>
      <p class="mt-2 text-xs text-slate-500">
        PRD：<a class="text-sky-700 underline" href="../../../docs/versions/v1.1.0/prd.md">docs/versions/v1.1.0/prd.md</a>
        · <a class="text-sky-700 underline" href="../../../index.html">全局总入口</a>
      </p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <!-- 左侧：页面清单 -->
      <div class="lg:col-span-5 space-y-6">
        <section>
          <h2 class="text-sm font-semibold text-slate-800 mb-2">PC端</h2>
          <div class="rounded-2xl bg-white border border-slate-200 shadow-sm overflow-hidden">
            <a class="flex items-center justify-between px-4 py-3 border-b border-slate-100 hover:bg-slate-50 no-underline text-slate-800"
               href="pages/pc_使用监督统计_主页面.html" target="_blank" rel="noreferrer">
              <div>
                <div class="text-sm font-semibold">使用监督统计 · 主页面</div>
                <div class="text-xs text-slate-500 mt-0.5">筛选 · 树表 · 用户使用 · 导出</div>
              </div>
              <i class="fa-solid fa-up-right-from-square text-slate-400 text-xs"></i>
            </a>
            <a class="flex items-center justify-between px-4 py-3 hover:bg-slate-50 no-underline text-slate-800"
               href="pages/pc_使用监督统计_用户明细.html?module=安环门户&client=PC" target="_blank" rel="noreferrer">
              <div>
                <div class="text-sm font-semibold">模块用户明细 · 子页</div>
                <div class="text-xs text-slate-500 mt-0.5">与抽屉口径一致</div>
              </div>
              <i class="fa-solid fa-up-right-from-square text-slate-400 text-xs"></i>
            </a>
          </div>
        </section>

        <section>
          <div class="flex items-center justify-between mb-2">
            <h2 class="text-sm font-semibold text-slate-800">企微H5端（手机壳）</h2>
            <a id="btnOpenShell" class="text-xs text-sky-700 underline" href="mobile-viewer.html" target="_blank" rel="noreferrer">全屏手机壳</a>
          </div>
          <div class="rounded-2xl bg-white border border-slate-200 shadow-sm p-3 grid grid-cols-1 sm:grid-cols-2 gap-2">
            <button type="button" class="mobileLink text-left rounded-xl px-3 py-2 border border-slate-200" data-page="违章管理_违章登记_list.html">
              <div class="text-sm font-semibold text-slate-800">违章登记 · 列表</div>
              <div class="text-xs text-slate-500">新增跳转表单</div>
            </button>
            <button type="button" class="mobileLink text-left rounded-xl px-3 py-2 border border-slate-200" data-page="wecom_违章管理_违章登记_form.html">
              <div class="text-sm font-semibold text-slate-800">新增违章登记</div>
              <div class="text-xs text-slate-500">分组字段表单</div>
            </button>
            <button type="button" class="mobileLink text-left rounded-xl px-3 py-2 border border-slate-200" data-page="违章管理_违章处理_list.html">
              <div class="text-sm font-semibold text-slate-800">违章处理 · 列表</div>
              <div class="text-xs text-slate-500">处理跳转表单</div>
            </button>
            <button type="button" class="mobileLink text-left rounded-xl px-3 py-2 border border-slate-200" data-page="wecom_违章管理_违章处理_form.html">
              <div class="text-sm font-semibold text-slate-800">违章处理 · 表单</div>
              <div class="text-xs text-slate-500">考核扣除与说明</div>
            </button>
          </div>
        </section>
      </div>

      <!-- 右侧：手机壳 -->
      <div class="lg:col-span-7">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-sm font-semibold text-slate-800">企微 H5 预览</h2>
          <button type="button" id="btnOpenMobile" class="inline-flex items-center gap-2 rounded-xl px-3 py-2 bg-white border border-slate-200 text-xs font-medium text-slate-700 hover:bg-slate-50">
            <i class="fa-solid fa-up-right-from-square"></i>新窗口打开当前页
          </button>
        </div>
        <div class="phone mx-auto">
          <div class="island"></div>
          <iframe id="mobileFrame" title="wecom-h5" src="pages/违章管理_违章登记_list.html"></iframe>
        </div>
        <p class="mt-3 text-center text-xs text-slate-400">点左侧企微页面即可在壳内切换；页面内跳转（新增/处理）也在壳内完成</p>
      </div>
    </div>
  </div>

  <script>
    var mobileFrame = document.getElementById('mobileFrame');
    var links = Array.from(document.querySelectorAll('.mobileLink'));
    var btnOpenMobile = document.getElementById('btnOpenMobile');
    var btnOpenShell = document.getElementById('btnOpenShell');

    function setMobilePage(page) {
      mobileFrame.src = 'pages/' + page;
      btnOpenMobile.onclick = function () {
        window.open('pages/' + page, '_blank', 'noreferrer');
      };
      btnOpenShell.href = 'mobile-viewer.html?page=' + encodeURIComponent(page);
      links.forEach(function (l) {
        l.classList.toggle('active', l.dataset.page === page);
      });
    }

    links.forEach(function (btn) {
      btn.addEventListener('click', function () { setMobilePage(btn.dataset.page); });
    });
    setMobilePage('违章管理_违章登记_list.html');
  </script>
</body>
</html>
