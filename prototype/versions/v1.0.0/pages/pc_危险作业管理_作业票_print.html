  <script>
    const printType = document.getElementById('printType');
    const printSheet = document.getElementById('printSheet');

    Object.entries(PERMIT_TYPES).forEach(([key, cfg]) => {
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = cfg.licenseTitle;
      printType.appendChild(opt);
    });

    const urlType = new URLSearchParams(location.search).get('type');
    if (urlType && PERMIT_TYPES[urlType]) printType.value = urlType;

    function renderPrintSheet() {
      const type = printType.value;
      const cfg = PERMIT_TYPES[type];
      let html = `<div class="print-title">${cfg.licenseTitle}</div>`;
      html += `<div class="print-meta"><span>申请时间：2026 年 07 月 07 日</span><span>编号：WP-20260707-001</span></div>`;

      // 基本信息表格
      html += `<table class="print-table"><tbody>`;
      html += `<tr><td class="label">申请人员</td><td>张敏</td><td class="label">所属部门</td><td>安全环保部</td></tr>`;

      if (cfg.contentLabel) {
        html += `<tr><td class="label">${cfg.contentLabel}</td><td colspan="3">（示例内容）</td></tr>`;
      }
      if (cfg.locationLabel) {
        html += `<tr><td class="label">${cfg.locationLabel}</td><td>生产一车间</td>`;
        html += `<td class="label">施工单位</td><td>维修班</td></tr>`;
      } else if (type === 'earthwork') {
        html += `<tr><td class="label">施工机械</td><td>挖掘机</td><td class="label">施工单位</td><td>维修班</td></tr>`;
      } else if (type === 'lifting') {
        html += `<tr><td class="label">${cfg.contentLabel}</td><td>设备吊装</td><td class="label">${cfg.locationLabel}</td><td>仓储区</td></tr>`;
        html += `<tr><td class="label">吊装机械</td><td>汽车吊 25t</td><td class="label">吊装司机</td><td>李师傅</td></tr>`;
        html += `<tr><td class="label">指挥人员</td><td>王指挥</td><td class="label">证书编号</td><td>QZ-77120</td></tr>`;
      }

      html += `<tr><td class="label">作业负责人</td><td>王强</td><td class="label">作业监护人</td><td>钱师傅、李明</td></tr>`;

        html += `<tr><td class="label">电源接入点及许可用电功率</td><td>配电箱 A · 50kW</td><td class="label">工作电压</td><td>380V</td></tr>`;
        html += `<tr><td class="label">用电设备名称及额定功率</td><td colspan="3">电焊机 15kW、照明 2kW</td></tr>`;
        html += `<tr><td class="label">作业人员电工证号</td><td>DG-22018</td><td class="label">作业负责人电工证号</td><td>DG-33001</td></tr>`;
      }

      if (cfg.levelLabel) {
        html += `<tr><td class="label">${cfg.levelLabel}</td><td colspan="3">${cfg.levels[0].label}</td></tr>`;
      }

      html += `<tr><td class="label">${cfg.planTimeLabel}</td><td colspan="3">自 2026 年 07 月 08 日 09 时 00 分 至 2026 年 07 月 08 日 17 时 00 分 止</td></tr>`;

      if (cfg.workersLabel && type !== 'lifting') {
        html += `<tr><td class="label">${cfg.workersLabel}</td><td colspan="3">赵工（WA-10293）</td></tr>`;
      }
      if (type === 'lifting') {
        html += `<tr><td class="label">作业人员</td><td colspan="3">周师傅、孙工</td></tr>`;
      }

      }

      html += `<tr><td class="label">风险辨识结果</td><td colspan="3">${cfg.risks.join(' / ')}</td></tr>`;
      html += `</tbody></table>`;

        <th style="width:40px;">序号</th><th>安全措施</th><th style="width:80px;">确认</th></tr></thead><tbody>`;
      cfg.measures.forEach((m, i) => {
        html += `<tr><td style="text-align:center;">${i + 1}</td><td>${m}</td><td style="text-align:center;">涉及</td></tr>`;
      });
      html += `<tr><td style="text-align:center;">${cfg.measures.length + 1}</td><td>其他安全措施：</td><td></td></tr>`;
      html += `</tbody></table>`;

      // 审批签字
      html += `<div class="print-sign">`;
      cfg.approvals.forEach(a => {
        html += `<div class="print-sign-box"><div class="title">${a.node}${a.level ? '（' + a.level + '）' : ''}</div>
          <div>年 &nbsp;&nbsp; 月 &nbsp;&nbsp; 日 &nbsp;&nbsp; 时 &nbsp;&nbsp; 分</div></div>`;
      });
      html += `</div>`;

      // 交底与确认
      html += `<table class="print-table" style="margin-top:20px;"><tbody>`;
      html += `<tr><td class="label">现场安全交底人（作业负责人）</td><td></td><td class="label">接受交底人（作业监护人和作业人员）</td><td></td></tr>`;
      html += `<tr><td class="label">${cfg.confirmLabel}</td><td colspan="3">年 &nbsp;&nbsp; 月 &nbsp;&nbsp; 日 &nbsp;&nbsp; 时 &nbsp;&nbsp; 分</td></tr>`;
      html += `<tr><td class="label">${cfg.actualTimeLabel}</td><td colspan="3">自 &nbsp;&nbsp;&nbsp;&nbsp; 年 &nbsp; 月 &nbsp; 日 &nbsp; 时 &nbsp; 分 &nbsp; 至 &nbsp;&nbsp;&nbsp;&nbsp; 年 &nbsp; 月 &nbsp; 日 &nbsp; 时 &nbsp; 分 &nbsp; 止</td></tr>`;
      html += `<tr><td class="label">作业负责人完工验收</td><td colspan="3">年 &nbsp;&nbsp; 月 &nbsp;&nbsp; 日 &nbsp;&nbsp; 时 &nbsp;&nbsp; 分</td></tr>`;
      html += `</tbody></table>`;

      // 有限空间气体检测表
      if (cfg.hasGasDetection) {
        html += `<div style="margin-top:24px;font-weight:600;text-align:center;">有毒有害气体检测记录表</div>`;
        html += `<div style="font-size:13px;margin:8px 0;">开始通风时间：&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</div>`;
        html += `<table class="print-table print-measures"><thead><tr>
          <th>序号</th><th>检测时间</th>`;
        GAS_DETECTION_COLUMNS.forEach(c => { html += `<th>${c}</th>`; });
        html += `<th>作业监护人</th><th>作业负责人</th></tr></thead><tbody>`;
        for (let i = 1; i <= 2; i++) {
          html += `<tr><td style="text-align:center;">${i}</td><td></td>`;
          GAS_DETECTION_COLUMNS.forEach(() => { html += `<td style="text-align:center;">正常 □ 不正常 □</td>`; });
          html += `<td></td><td></td></tr>`;
        }
        html += `</tbody></table>`;
      }

      // 备注
      html += `<div class="print-note">注：${cfg.notes.map((n, i) => `${i + 1}.${n}`).join('；')}</div>`;

      printSheet.innerHTML = html;
    }

    renderPrintSheet();
  </script>
</body>
</html>
