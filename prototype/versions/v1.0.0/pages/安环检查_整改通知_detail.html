<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>整改通知详情</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="_mobile_layout.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    .btn { transition: transform 0.2s ease; }
    .btn:active { transform: scale(0.95); }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
  <header class="mobile-header px-5 pb-4">
    <div class="flex items-center justify-between">
      <button class="btn w-10 h-10 rounded-2xl bg-white/90 border border-slate-200 shadow-[0_4px_12px_rgba(0,0,0,0.05)]"
              onclick="navBack('安环检查_整改通知_list.html')">
        <i class="fa-solid fa-angle-left text-slate-700"></i>
      </button>
      <div class="text-sm font-semibold text-slate-900">查看整改通知</div>
      <div class="w-10"></div>
    </div>
    <div class="mt-2 text-xs text-slate-500 leading-relaxed">查看检查信息及隐患问题列表（只读）</div>
  </header>

  <main class="mobile-content space-y-4">
    <div class="rounded-3xl bg-white border border-slate-200 shadow-[0_4px_12px_rgba(0,0,0,0.05)] p-4 space-y-3">
      <div class="flex items-center justify-between">
        <div class="text-sm font-semibold text-slate-800">检查信息</div>
        <span id="statusBadge" class="px-2.5 py-1 rounded-full text-[11px] font-semibold border"></span>
      </div>
      <div class="grid grid-cols-2 gap-2 text-xs">
        <div class="rounded-2xl bg-slate-50 border border-slate-200 p-3">
          <div class="text-slate-500">检查类型</div>
          <div class="mt-1 font-semibold text-slate-800">专项检查</div>
        </div>
        <div class="rounded-2xl bg-slate-50 border border-slate-200 p-3">
          <div class="text-slate-500">检查日期</div>
          <div class="mt-1 font-semibold text-slate-800">2026-07-06</div>
        </div>
        <div class="rounded-2xl bg-slate-50 border border-slate-200 p-3">
          <div class="text-slate-500">检查人</div>
          <div class="mt-1 font-semibold text-slate-800">张敏</div>
        </div>
        <div class="rounded-2xl bg-slate-50 border border-slate-200 p-3">
          <div class="text-slate-500">被检查单位</div>
          <div class="mt-1 font-semibold text-slate-800">仓储区</div>
        </div>
        <div class="rounded-2xl bg-slate-50 border border-slate-200 p-3">
          <div class="text-slate-500">整改责任人</div>
          <div class="mt-1 font-semibold text-slate-800">王强</div>
        </div>
        <div class="rounded-2xl bg-slate-50 border border-slate-200 p-3">
          <div class="text-slate-500">整改截止日期</div>
          <div class="mt-1 font-semibold text-slate-800">2026-07-10</div>
        </div>
        <div class="rounded-2xl bg-slate-50 border border-slate-200 p-3 col-span-2">
          <div class="text-slate-500">风险等级</div>
          <div class="mt-1 font-semibold text-slate-800">中</div>
        </div>
      </div>
    </div>

    <div class="rounded-3xl bg-white border border-slate-200 shadow-[0_4px_12px_rgba(0,0,0,0.05)] p-4">
      <div class="text-sm font-semibold text-slate-800 mb-3">隐患问题列表</div>
      <div class="space-y-3" id="hazardList"></div>
    </div>
  </main>


  <script src="_shared_mobile.js"></script>
  <script src="_rectify_data.js"></script>
  <script>
    const id = new URLSearchParams(location.search).get('id') || '1';
    const record = RECTIFY_RECORDS[id] || RECTIFY_RECORDS['1'];

    const badge = qs('#statusBadge');
    badge.textContent = record.statusLabel;
    badge.className = `px-2.5 py-1 rounded-full text-[11px] font-semibold border ${record.badge}`;

    qs('#hazardList').innerHTML = record.hazards.map(h => `
      <div class="rounded-2xl bg-slate-50 border border-slate-200 p-3">
        <div class="flex items-start justify-between gap-2">
          <div class="text-sm font-semibold text-slate-900">${h.title}</div>
          <span class="shrink-0 text-[11px] px-2 py-0.5 rounded-full border ${h.done ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-amber-50 text-amber-700 border-amber-200'}">${h.done ? '已整改' : '待整改'}</span>
        </div>
        <div class="text-xs text-slate-500 mt-1">${h.meta}</div>
        <div class="text-xs text-slate-600 mt-2"><span class="text-slate-500">整改要求：</span>${h.requirement}</div>
        ${h.rectifyNote ? `<div class="text-xs text-slate-600 mt-2"><span class="text-slate-500">整改说明：</span>${h.rectifyNote}</div>` : ''}
      </div>
    `).join('');

    syncMobileLayout();
  </script>
</body>
</html>
