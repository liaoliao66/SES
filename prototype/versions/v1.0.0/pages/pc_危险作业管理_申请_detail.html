        <img src="https://images.unsplash.com/photo-1560179707-f14e90ef3623?auto=format&fit=crop&w=80&h=28&q=80" alt="logo" style="height:28px;border-radius:2px;">
        <span>智慧港口管理平台</span>

      <nav class="pc-topnav-modules">

        <a href="#">大屏管理</a>
      </nav>
      <div class="pc-topnav-right">
        <i class="fa-solid fa-magnifying-glass"></i>
        <span class="pc-badge" data-count="6"><i class="fa-regular fa-bell"></i></span>
        <span class="pc-badge" data-count="7"><i class="fa-regular fa-envelope"></i></span>
        <div class="pc-user">
          <img class="pc-user-avatar" src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=crop&w=56&h=56&q=80" alt="">
          <span>欢迎您，武大管理员</span>
        </div>
      </div>
    </header>

    <div class="pc-body">
      <aside class="pc-sidebar">
        <div class="pc-sidebar-search">
          <input type="text" placeholder="请输入关键词搜索">
        </div>
        <ul class="pc-menu">
          <li class="pc-menu-group open">
            <a class="pc-menu-item active" href="#"><span class="pc-menu-icon"><i class="fa-solid fa-helmet-safety"></i></span>危险作业管理<i class="fa-solid fa-chevron-right pc-menu-arrow"></i></a>
            <ul class="pc-submenu">
              <li><a href="pc_危险作业管理_申请_list.html" class="active">危险作业申请</a></li>
            </ul>
          </li>
        </ul>
      </aside>

      <main class="pc-main">
        <div class="pc-tabs">
          <a class="pc-tab" href="pc_危险作业管理_申请_list.html">危险作业申请 <span class="close">×</span></a>
          <a class="pc-tab active" href="pc_危险作业管理_申请_detail.html">申请详情 <span class="close">×</span></a>
        </div>

        <div class="pc-content">
          <!-- 操作栏 -->
          <div class="pc-toolbar">
            <div class="pc-toolbar-left">
              <a class="pc-btn" href="pc_危险作业管理_申请_list.html"><i class="fa-solid fa-arrow-left"></i> 返回列表</a>
            </div>
            <div class="pc-toolbar-right">
              <a class="pc-btn" id="editLink" href="pc_危险作业管理_申请_form.html"><i class="fa-solid fa-pen"></i> 编辑</a>
              <button class="pc-btn" onclick="alert('已发起审批')"><i class="fa-solid fa-paper-plane"></i> 发起审批</button>
              <a class="pc-btn pc-btn-primary" id="printLink" href="pc_危险作业管理_作业票_print.html"><i class="fa-solid fa-print"></i> 作业票打印</a>
            </div>
          </div>

          <div id="detailContent"></div>
        </div>
      </main>
    </div>
  </div>

  <script src="_pc_permit_data.js"></script>
  <script>
    const type = new URLSearchParams(location.search).get('type') || 'hot_work';
    const cfg = PERMIT_TYPES[type];
    document.getElementById('editLink').href = `pc_危险作业管理_申请_form.html?type=${type}`;
    document.getElementById('printLink').href = `pc_危险作业管理_作业票_print.html?type=${type}`;

    let html = `<div class="pc-detail-card"><div class="pc-detail-header">
      <span>${cfg.licenseTitle} — 申请详情</span><span class="pc-status pc-status-pending">待审批</span></div>
      <div class="pc-detail-body"><div class="pc-detail-grid">
        <div class="pc-detail-item"><label>申请编号</label><span>WP-20260708-001</span></div>
        <div class="pc-detail-item"><label>作业类型</label><span>${cfg.name}</span></div>
        <div class="pc-detail-item"><label>申请人员</label><span>张敏</span></div>
        <div class="pc-detail-item"><label>所属部门</label><span>安全环保部</span></div>
        <div class="pc-detail-item"><label>作业负责人</label><span>王强</span></div>
        <div class="pc-detail-item"><label>作业监护人</label><span>钱师傅、李明</span></div>
        <div class="pc-detail-item"><label>施工单位</label><span>维修班</span></div>`;

    if (cfg.contentLabel) html += `<div class="pc-detail-item"><label>${cfg.contentLabel}</label><span>（示例）</span></div>`;
    if (cfg.locationLabel) html += `<div class="pc-detail-item"><label>${cfg.locationLabel}</label><span>生产一车间</span></div>`;
    if (cfg.levelLabel) html += `<div class="pc-detail-item"><label>${cfg.levelLabel}</label><span>${cfg.levels[0].label}</span></div>`;
    if (cfg.extraFields) {
      cfg.extraFields.forEach(f => {
        html += `<div class="pc-detail-item"><label>${f.label}</label><span>（示例）</span></div>`;
      });
    }
    html += `</div>
      <div style="margin-top:16px;"><label style="font-size:12px;color:var(--pc-text-muted);">风险辨识</label>
      <p style="margin:4px 0 0;font-size:13px;">${cfg.risks.join('、')}</p></div></div></div>`;

    // 安全措施
    html += `<div class="pc-detail-card"><div class="pc-detail-header">安全措施确认</div>
      <div class="pc-detail-body" style="padding:0;"><table class="pc-table"><thead><tr>
        <th>序号</th><th>安全措施</th><th>是否涉及</th></tr></thead><tbody>`;
    cfg.measures.forEach((m, i) => {
      html += `<tr><td>${i+1}</td><td>${m}</td><td>涉及</td></tr>`;
    });
    html += `</tbody></table></div></div>`;

    // 审批记录
    html += `<div class="pc-detail-card"><div class="pc-detail-header">审批记录</div>
      <div class="pc-detail-body" style="padding:0;"><table class="pc-table"><thead><tr>
        <th>序号</th><th>审批节点</th><th>审批人</th><th>审批时间</th><th>状态</th></tr></thead><tbody>
        <tr><td>1</td><td>提交申请</td><td>张敏</td><td>2026-07-07 10:12</td><td><span class="pc-status pc-status-pass">已完成</span></td></tr>`;
    cfg.approvals.forEach((a, i) => {
      html += `<tr><td>${i+2}</td><td>${a.node}${a.level ? '（' + a.level + '）' : ''}</td><td>—</td><td>—</td>
        <td><span class="pc-status ${i === 0 ? 'pc-status-pending' : 'pc-status-draft'}">${i === 0 ? '待审批' : '未开始'}</span></td></tr>`;
    });
    html += `</tbody></table></div></div>`;

    document.getElementById('detailContent').innerHTML = html;
  </script>
</body>
</html>
