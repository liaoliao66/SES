<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>新增检查记录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="mobile-layout.css">
  <style>
/* App 端通用布局 — 避免 fixed 顶栏遮挡内容 */
.mobile-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 40;
  padding-top: 3rem;
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid #e2e8f0;
}

.mobile-content {
  padding-top: var(--mobile-header-h, 11.5rem);
  padding-bottom: 1.5rem;
  padding-left: 1.25rem;
  padding-right: 1.25rem;
}

.hide-scrollbar::-webkit-scrollbar { display: none; }
.hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

</style>
  
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    .glass { background: rgba(255,255,255,0.78); backdrop-filter: blur(18px); }
    .btn { transition: transform 0.2s ease; }
    .btn:active { transform: scale(0.95); }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
  <header class="mobile-header px-5 pb-4">
    <div class="flex items-center justify-between">
      <button class="btn w-10 h-10 rounded-2xl bg-white/90 border border-slate-200 shadow-[0_4px_12px_rgba(0,0,0,0.05)]"
              onclick="navBack('安环检查_检查记录_list.html')">
        <i class="fa-solid fa-angle-left text-slate-700"></i>
      </button>
      <div class="text-sm font-semibold text-slate-900">新增检查记录</div>
      <button class="btn w-10 h-10 rounded-2xl bg-white/90 border border-slate-200"
              onclick="toast('原型演示：暂存草稿')">
        <i class="fa-regular fa-bookmark text-slate-700"></i>
      </button>
    </div>
    <div class="mt-3 text-xs text-slate-500 leading-relaxed">
      来自手册：检查类型、检查日期、检查人/责任人/被检查单位、结果（正常/异常）；异常需填写整改责任人/截止日期/风险等级并添加隐患项目。
    </div>
  </header>

  <form class="mobile-content space-y-4" onsubmit="event.preventDefault();">
    <div class="rounded-3xl bg-white border border-slate-200 shadow-[0_4px_12px_rgba(0,0,0,0.05)] p-4 space-y-3">
      <div class="text-sm font-semibold text-slate-800">基础信息</div>
      <div class="grid grid-cols-2 gap-3">
        <label class="block">
          <div class="text-xs text-slate-500 mb-1">检查类型</div>
          <select class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm" id="checkType">
            <option>综合检查</option>
            <option>专项检查</option>
            <option>日常巡检</option>
          </select>
        </label>
        <label class="block">
          <div class="text-xs text-slate-500 mb-1">检查日期</div>
          <input type="date" class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm" value="2026-07-07"/>
        </label>
        <label class="block">
          <div class="text-xs text-slate-500 mb-1">检查人</div>
          <input class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm" value="张敏"/>
        </label>
        <label class="block">
          <div class="text-xs text-slate-500 mb-1">责任人</div>
          <input class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm" value="王强"/>
        </label>
        <label class="block col-span-2">
          <div class="text-xs text-slate-500 mb-1">被检查单位</div>
          <input class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm" value="生产一车间"/>
        </label>
      </div>
    </div>

    <div class="rounded-3xl bg-white border border-slate-200 shadow-[0_4px_12px_rgba(0,0,0,0.05)] p-4 space-y-3">
      <div class="flex items-center justify-between">
        <div class="text-sm font-semibold text-slate-800">检查结果</div>
        <div class="inline-flex rounded-2xl bg-slate-100 p-1 border border-slate-200">
          <button type="button" id="btnNormal" class="btn px-3 py-1.5 rounded-xl text-xs font-semibold bg-white text-slate-900 shadow-[0_4px_12px_rgba(0,0,0,0.05)]">正常</button>
          <button type="button" id="btnAbnormal" class="btn px-3 py-1.5 rounded-xl text-xs font-semibold text-slate-600">异常</button>
        </div>
      </div>

      <div id="normalPanel" class="space-y-3">
        <label class="block">
          <div class="text-xs text-slate-500 mb-1">说明</div>
          <textarea class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm" rows="3" placeholder="输入说明（示例）"></textarea>
        </label>
        <div class="rounded-2xl bg-slate-50 border border-slate-200 p-3 text-sm text-slate-700 flex items-center justify-between">
          <div><i class="fa-regular fa-image mr-2 text-slate-500"></i>上传资料/现场照片</div>
          <button type="button" class="btn text-xs font-semibold text-slate-700" onclick="toast('原型演示：上传附件')">选择</button>
        </div>
      </div>

      <div id="abnormalPanel" class="space-y-3 hidden">
        <div class="grid grid-cols-2 gap-3">
          <label class="block">
            <div class="text-xs text-slate-500 mb-1">整改责任人</div>
            <input class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm" value="王强"/>
          </label>
          <label class="block">
            <div class="text-xs text-slate-500 mb-1">整改截止日期</div>
            <input type="date" class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm" value="2026-07-10"/>
          </label>
          <label class="block col-span-2">
            <div class="text-xs text-slate-500 mb-1">风险等级</div>
            <select class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm">
              <option>低</option>
              <option selected>中</option>
              <option>高</option>
            </select>
          </label>
        </div>

        <div class="rounded-3xl bg-slate-50 border border-slate-200 p-3">
          <div class="flex items-center justify-between">
            <div class="text-sm font-semibold text-slate-800">风险隐患项目（可多条）</div>
            <button type="button" class="btn px-3 py-2 rounded-2xl bg-white border border-slate-200 text-xs font-semibold text-slate-700"
                    onclick="toast('原型演示：新增隐患项目（从隐患库或手动录入）')">
              <i class="fa-solid fa-plus mr-1"></i>添加
            </button>
          </div>
          <div class="mt-3 space-y-2">
            <div class="rounded-2xl bg-white border border-slate-200 p-3">
              <div class="flex items-start justify-between">
                <div>
                  <div class="text-sm font-semibold text-slate-900">隐患 1：配电箱门未闭合</div>
                  <div class="text-xs text-slate-500 mt-1">类型：电气 · 一般隐患 · 来源：隐患库</div>
                </div>
                <button type="button" class="btn text-xs text-rose-700" onclick="toast('原型演示：删除隐患条目')">删除</button>
              </div>
              <div class="text-xs text-slate-600 mt-2">整改要求：立即整改并张贴警示标识（示例）。</div>
            </div>
            <div class="rounded-2xl bg-white border border-slate-200 p-3">
              <div class="flex items-start justify-between">
                <div>
                  <div class="text-sm font-semibold text-slate-900">隐患 2：通道堆放杂物</div>
                  <div class="text-xs text-slate-500 mt-1">类型：现场管理 · 一般隐患 · 来源：手动录入</div>
                </div>
                <button type="button" class="btn text-xs text-rose-700" onclick="toast('原型演示：删除隐患条目')">删除</button>
              </div>
              <div class="text-xs text-slate-600 mt-2">整改要求：清理通道，确保疏散畅通（示例）。</div>
            </div>
          </div>
          <div class="mt-3 text-xs text-slate-500">提示：隐患条目支持上传隐患照片及资料（原型略）。</div>
        </div>
      </div>
    </div>
  </form>


  <script>// Shared helpers for mobile prototype pages (vanilla JS, no build).
function qs(sel, root) { return (root || document).querySelector(sel); }
function qsa(sel, root) { return Array.from((root || document).querySelectorAll(sel)); }

function toast(message) {
  const el = document.createElement('div');
  el.className = 'fixed left-1/2 -translate-x-1/2 bottom-24 z-[999] px-4 py-2 rounded-2xl text-sm font-medium text-white bg-slate-900/90 shadow-[0_8px_24px_rgba(0,0,0,0.18)]';
  el.textContent = message;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 250ms ease'; }, 1200);
  setTimeout(() => el.remove(), 1700);
}

function navTo(page) {
  window.location.href = page;
}

function navBack(fallback) {
  if (history.length > 1) history.back();
  else if (fallback) navTo(fallback);
}

/** 同步 fixed 顶栏高度，避免内容被遮挡 */
function syncMobileLayout() {
  const header = document.querySelector('.mobile-header');
  if (header) {
    document.documentElement.style.setProperty('--mobile-header-h', header.offsetHeight + 'px');
  }
}

if (typeof document !== 'undefined') {
  document.addEventListener('DOMContentLoaded', syncMobileLayout);
  window.addEventListener('resize', syncMobileLayout);
}

function setActiveTab(tabId) {
  const items = qsa('[data-tab]');
  items.forEach(i => {
    const active = i.dataset.tab === tabId;
    i.classList.toggle('text-slate-900', active);
    i.classList.toggle('text-slate-500', !active);
    const dot = i.querySelector('[data-dot]');
    if (dot) dot.classList.toggle('opacity-100', active);
    if (dot) dot.classList.toggle('opacity-0', !active);
  });
}

</script>
  <script>
    const normal = qs('#btnNormal');
    const abnormal = qs('#btnAbnormal');
    const normalPanel = qs('#normalPanel');
    const abnormalPanel = qs('#abnormalPanel');

    function setMode(mode) {
      const isNormal = mode === 'normal';
      normal.className = 'btn px-3 py-1.5 rounded-xl text-xs font-semibold ' + (isNormal ? 'bg-white text-slate-900 shadow-[0_4px_12px_rgba(0,0,0,0.05)]' : 'text-slate-600');
      abnormal.className = 'btn px-3 py-1.5 rounded-xl text-xs font-semibold ' + (!isNormal ? 'bg-white text-slate-900 shadow-[0_4px_12px_rgba(0,0,0,0.05)]' : 'text-slate-600');
      normalPanel.classList.toggle('hidden', !isNormal);
      abnormalPanel.classList.toggle('hidden', isNormal);
    }

    normal.addEventListener('click', () => setMode('normal'));
    abnormal.addEventListener('click', () => setMode('abnormal'));
    setMode('normal');
  </script>
</body>
</html>
