<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>整改</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="mobile-layout.css">
  <style>
/* App 端通用布局 — 避免 fixed 顶栏遮挡内容 */
.mobile-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 40;
  padding-top: 3rem;
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid #e2e8f0;
}

.mobile-content {
  padding-top: var(--mobile-header-h, 11.5rem);
  padding-bottom: 1.5rem;
  padding-left: 1.25rem;
  padding-right: 1.25rem;
}

.hide-scrollbar::-webkit-scrollbar { display: none; }
.hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

</style>
  
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    .btn { transition: transform 0.2s ease; }
    .btn:active { transform: scale(0.95); }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
  <header class="mobile-header px-5 pb-4">
    <div class="flex items-center justify-between">
      <button class="btn w-10 h-10 rounded-2xl bg-white/90 border border-slate-200 shadow-[0_4px_12px_rgba(0,0,0,0.05)]"
              onclick="navBack('安环检查_整改通知_list.html')">
        <i class="fa-solid fa-angle-left text-slate-700"></i>
      </button>
      <div class="text-sm font-semibold text-slate-900">整改</div>
      <div class="w-10"></div>
    </div>
    <div class="mt-2 text-xs text-slate-500 leading-relaxed">审核已在检查提交时自动发起；请在审批过程中逐条完成隐患整改填写</div>
  </header>

  <main class="mobile-content space-y-4">
    <div class="rounded-2xl bg-blue-50 border border-blue-200 px-4 py-3 text-xs text-blue-800 leading-relaxed">
      <i class="fa-solid fa-bolt mr-1"></i>无需手动发起审批。完成全部隐患整改后，业务状态将进入「待复核」。
    </div>
    <div class="rounded-3xl bg-white border border-slate-200 shadow-[0_4px_12px_rgba(0,0,0,0.05)] p-4">
      <div class="text-sm font-semibold text-slate-800 mb-3" id="recordTitle">专项检查（仓储区）</div>
      <div class="grid grid-cols-2 gap-2 text-xs">
        <div class="rounded-2xl bg-slate-50 border border-slate-200 p-3">
          <div class="text-slate-500">检查类型</div>
          <div class="mt-1 font-semibold">专项检查</div>
        </div>
        <div class="rounded-2xl bg-slate-50 border border-slate-200 p-3">
          <div class="text-slate-500">检查日期</div>
          <div class="mt-1 font-semibold">2026-07-06</div>
        </div>
        <div class="rounded-2xl bg-slate-50 border border-slate-200 p-3">
          <div class="text-slate-500">整改责任人</div>
          <div class="mt-1 font-semibold">王强</div>
        </div>
        <div class="rounded-2xl bg-slate-50 border border-slate-200 p-3">
          <div class="text-slate-500">整改截止</div>
          <div class="mt-1 font-semibold">2026-07-10</div>
        </div>
      </div>
    </div>

    <div class="rounded-3xl bg-white border border-slate-200 shadow-[0_4px_12px_rgba(0,0,0,0.05)] p-4">
      <div class="flex items-center justify-between mb-3">
        <div class="text-sm font-semibold text-slate-800">隐患问题列表</div>
        <div class="text-xs text-slate-500" id="progressText">0/2 已整改</div>
      </div>
      <div class="space-y-3" id="hazardList"></div>
    </div>
  </main>


  <script>// Shared helpers for mobile prototype pages (vanilla JS, no build).
function qs(sel, root) { return (root || document).querySelector(sel); }
function qsa(sel, root) { return Array.from((root || document).querySelectorAll(sel)); }

function toast(message) {
  const el = document.createElement('div');
  el.className = 'fixed left-1/2 -translate-x-1/2 bottom-24 z-[999] px-4 py-2 rounded-2xl text-sm font-medium text-white bg-slate-900/90 shadow-[0_8px_24px_rgba(0,0,0,0.18)]';
  el.textContent = message;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 250ms ease'; }, 1200);
  setTimeout(() => el.remove(), 1700);
}

function navTo(page) {
  window.location.href = page;
}

function navBack(fallback) {
  if (history.length > 1) history.back();
  else if (fallback) navTo(fallback);
}

/** 同步 fixed 顶栏高度，避免内容被遮挡 */
function syncMobileLayout() {
  const header = document.querySelector('.mobile-header');
  if (header) {
    document.documentElement.style.setProperty('--mobile-header-h', header.offsetHeight + 'px');
  }
}

if (typeof document !== 'undefined') {
  document.addEventListener('DOMContentLoaded', syncMobileLayout);
  window.addEventListener('resize', syncMobileLayout);
}

function setActiveTab(tabId) {
  const items = qsa('[data-tab]');
  items.forEach(i => {
    const active = i.dataset.tab === tabId;
    i.classList.toggle('text-slate-900', active);
    i.classList.toggle('text-slate-500', !active);
    const dot = i.querySelector('[data-dot]');
    if (dot) dot.classList.toggle('opacity-100', active);
    if (dot) dot.classList.toggle('opacity-0', !active);
  });
}

</script>
  <script>/** 整改通知示例数据 */
const RECTIFY_RECORDS = {
  '1': {
    title: '专项检查（仓储区）',
    status: 'pending',
    statusLabel: '待整改',
    badge: 'bg-amber-50 text-amber-700 border-amber-200',
    hazards: [
      {
        id: 'h1',
        title: '隐患 1：配电箱门未闭合',
        hazardType: '安全隐患',
        isMajor: false,

        requirement: '立即整改并张贴警示标识，确保配电箱门正常关闭并上锁。',

        ],
        attachments: ['现场检查记录.pdf'],

      },
      {

        requirement: '清理通道，确保疏散畅通，不得占用消防通道。',
        problemPhotos: [
          'https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&w=200&h=200&q=80',
          'https://images.unsplash.com/photo-1605745341112-85968b19335b?auto=format&fit=crop&w=200&h=200&q=80'
        ],
        attachments: [],
        done: false
      }
    ]
  },
  '2': {
    title: '日常巡检（码头区）',
    status: 'review',
    statusLabel: '待复核',
    badge: 'bg-blue-50 text-blue-700 border-blue-200',
    hazards: [
      {
        id: 'h3',
        title: '隐患 1：消防器材过期',
        hazardType: '安全隐患',
        isMajor: true,
        description: '码头区 3 号仓库灭火器已超过检验有效期。',
        requirement: '更换过期器材并更新消防台账。',

        ],

  },
  '3': {
    title: '综合检查（生产一车间）',
    status: 'done',
    statusLabel: '已复核',
    badge: 'bg-emerald-50 text-emerald-700 border-emerald-200',
    hazards: [
      {
        id: 'h4', title: '隐患 1：安全标识缺失', hazardType: '安全隐患', isMajor: false,
        description: '车间入口及作业区域缺少安全警示标识。', requirement: '补齐标识牌',
        problemPhotos: ['https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?auto=format&fit=crop&w=200&h=200&q=80'],
        attachments: [], done: true, rectifyNote: '已补齐 3 处标识。'
      },
      {
        id: 'h5', title: '隐患 2：防护栏损坏', hazardType: '安全隐患', isMajor: false,
        description: '二层平台防护栏局部变形损坏。', requirement: '修复防护栏',
        problemPhotos: ['https://images.unsplash.com/photo-1504917595217-d4dc5ebe6122?auto=format&fit=crop&w=200&h=200&q=80'],
        attachments: [], done: true, rectifyNote: '已完成焊接修复。'
      },
      {
        id: 'h6', title: '隐患 3：地面油污', hazardType: '安全隐患', isMajor: false,
        description: '设备下方地面存在油污，存在滑倒风险。', requirement: '清理并防滑处理',
        problemPhotos: ['https://images.unsplash.com/photo-1581092918056-0c4c3acd3789?auto=format&fit=crop&w=200&h=200&q=80'],
        attachments: [], done: true, rectifyNote: '已清理并铺设防滑垫。'

};
</script>
  <script>
    const id = new URLSearchParams(location.search).get('id') || '1';
    let record = JSON.parse(JSON.stringify(RECTIFY_RECORDS[id] || RECTIFY_RECORDS['1']));

    // 从 sessionStorage 恢复已整改状态（原型演示）
    const saved = sessionStorage.getItem('rectify_' + id);
    if (saved) {
      const doneIds = JSON.parse(saved);
      record.hazards.forEach(h => {
        if (doneIds.includes(h.id)) h.done = true;
        const note = sessionStorage.getItem(`rectify_note_${id}_${h.id}`);
        if (note) h.rectifyNote = note;
      });
    }

    qs('#recordTitle').textContent = record.title;

    function updateProgress() {
      const total = record.hazards.length;
      const done = record.hazards.filter(h => h.done).length;
      qs('#progressText').textContent = `${done}/${total} 已整改`;
    }

    function renderHazards() {
      qs('#hazardList').innerHTML = record.hazards.map(h => `
        <div class="rounded-2xl border p-3 ${h.done ? 'bg-emerald-50/50 border-emerald-200' : 'bg-slate-50 border-slate-200'}">
          <div class="flex items-start justify-between gap-2">
            <div class="text-sm font-semibold text-slate-900">${h.title}</div>
            <span class="shrink-0 text-[11px] px-2 py-0.5 rounded-full border ${h.done ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-amber-50 text-amber-700 border-amber-200'}">${h.done ? '已整改' : '待整改'}</span>
          </div>
          <div class="text-xs text-slate-500 mt-1">${h.meta}</div>
          <div class="text-xs text-slate-600 mt-2">整改要求：${h.requirement}</div>
          ${h.rectifyNote ? `<div class="text-xs text-emerald-700 mt-2">整改说明：${h.rectifyNote}</div>` : ''}
          <div class="mt-3 flex justify-end">
            ${h.done
              ? `<button class="btn px-3 py-1.5 rounded-xl bg-white border border-slate-200 text-xs text-slate-600" onclick="navTo('安环检查_整改通知_hazard_form.html?record=${id}&hazard=${h.id}')">查看整改</button>`
              : `<button class="btn px-3 py-2 rounded-2xl bg-slate-900 text-white text-xs font-semibold" onclick="navTo('安环检查_整改通知_hazard_form.html?record=${id}&hazard=${h.id}')">整改</button>`
            }
          </div>
        </div>
      `).join('');
      updateProgress();
      syncMobileLayout();
    }

    renderHazards();
  </script>
</body>
</html>
