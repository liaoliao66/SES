<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ж•ҙж”№</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="mobile-layout.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    .btn { transition: transform 0.2s ease; }
    .btn:active { transform: scale(0.95); }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
  <header class="mobile-header px-5 pb-4">
    <div class="flex items-center justify-between">
      <button class="btn w-10 h-10 rounded-2xl bg-white/90 border border-slate-200 shadow-[0_4px_12px_rgba(0,0,0,0.05)]"
              onclick="navBack('е®үзҺҜжЈҖжҹҘ_ж•ҙж”№йҖҡзҹҘ_list.html')">
        <i class="fa-solid fa-angle-left text-slate-700"></i>
      </button>
      <div class="text-sm font-semibold text-slate-900">ж•ҙж”№</div>
      <div class="w-10"></div>
    </div>
    <div class="mt-2 text-xs text-slate-500 leading-relaxed">жҹҘзңӢжЈҖжҹҘдҝЎжҒҜпјҢйҖҗжқЎе®ҢжҲҗйҡҗжӮЈж•ҙж”№пјӣе…ЁйғЁе®ҢжҲҗеҗҺеҸҜеҸ‘иө·е®Ўжү?/div>
  </header>

  <main class="mobile-content space-y-4">
    <div class="rounded-3xl bg-white border border-slate-200 shadow-[0_4px_12px_rgba(0,0,0,0.05)] p-4">
      <div class="text-sm font-semibold text-slate-800 mb-3" id="recordTitle">дё“йЎ№жЈҖжҹҘпјҲд»“еӮЁеҢәпјү</div>
      <div class="grid grid-cols-2 gap-2 text-xs">
        <div class="rounded-2xl bg-slate-50 border border-slate-200 p-3">
          <div class="text-slate-500">жЈҖжҹҘзұ»еһ?/div>
          <div class="mt-1 font-semibold">дё“йЎ№жЈҖжҹ?/div>
        </div>
        <div class="rounded-2xl bg-slate-50 border border-slate-200 p-3">
          <div class="text-slate-500">жЈҖжҹҘж—Ҙжң?/div>
          <div class="mt-1 font-semibold">2026-07-06</div>
        </div>
        <div class="rounded-2xl bg-slate-50 border border-slate-200 p-3">
          <div class="text-slate-500">ж•ҙж”№иҙЈд»»дә?/div>
          <div class="mt-1 font-semibold">зҺӢејә</div>
        </div>
        <div class="rounded-2xl bg-slate-50 border border-slate-200 p-3">
          <div class="text-slate-500">ж•ҙж”№жҲӘжӯў</div>
          <div class="mt-1 font-semibold">2026-07-10</div>
        </div>
      </div>
    </div>

    <div class="rounded-3xl bg-white border border-slate-200 shadow-[0_4px_12px_rgba(0,0,0,0.05)] p-4">
      <div class="flex items-center justify-between mb-3">
        <div class="text-sm font-semibold text-slate-800">йҡҗжӮЈй—®йўҳеҲ—иЎЁ</div>
        <div class="text-xs text-slate-500" id="progressText">0/2 е·Іж•ҙж”?/div>
      </div>
      <div class="space-y-3" id="hazardList"></div>
    </div>
  </main>


  <script src="shared-mobile.js"></script>
  <script src="rectify-data.js"></script>
  <script>
    const id = new URLSearchParams(location.search).get('id') || '1';
    let record = JSON.parse(JSON.stringify(RECTIFY_RECORDS[id] || RECTIFY_RECORDS['1']));

    // д»?sessionStorage жҒўеӨҚе·Іж•ҙж”№зҠ¶жҖҒпјҲеҺҹеһӢжј”зӨәпј?
    const saved = sessionStorage.getItem('rectify_' + id);
    if (saved) {
      const doneIds = JSON.parse(saved);
      record.hazards.forEach(h => {
        if (doneIds.includes(h.id)) h.done = true;
        const note = sessionStorage.getItem(`rectify_note_${id}_${h.id}`);
        if (note) h.rectifyNote = note;
      });
    }

    qs('#recordTitle').textContent = record.title;

    function updateProgress() {
      const total = record.hazards.length;
      const done = record.hazards.filter(h => h.done).length;
      qs('#progressText').textContent = `${done}/${total} е·Іж•ҙж”№`;
    }

    function renderHazards() {
      qs('#hazardList').innerHTML = record.hazards.map(h => `
        <div class="rounded-2xl border p-3 ${h.done ? 'bg-emerald-50/50 border-emerald-200' : 'bg-slate-50 border-slate-200'}">
          <div class="flex items-start justify-between gap-2">
            <div class="text-sm font-semibold text-slate-900">${h.title}</div>
            <span class="shrink-0 text-[11px] px-2 py-0.5 rounded-full border ${h.done ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-amber-50 text-amber-700 border-amber-200'}">${h.done ? 'е·Іж•ҙж”? : 'еҫ…ж•ҙж”?}</span>
          </div>
          <div class="text-xs text-slate-500 mt-1">${h.meta}</div>
          <div class="text-xs text-slate-600 mt-2">ж•ҙж”№иҰҒжұӮпј?{h.requirement}</div>
          ${h.rectifyNote ? `<div class="text-xs text-emerald-700 mt-2">ж•ҙж”№иҜҙжҳҺпј?{h.rectifyNote}</div>` : ''}
          <div class="mt-3 flex justify-end">
            ${h.done
              ? `<button class="btn px-3 py-1.5 rounded-xl bg-white border border-slate-200 text-xs text-slate-600" onclick="navTo('е®үзҺҜжЈҖжҹҘ_ж•ҙж”№йҖҡзҹҘ_hazard_form.html?record=${id}&hazard=${h.id}')">жҹҘзңӢж•ҙж”№</button>`
              : `<button class="btn px-3 py-2 rounded-2xl bg-slate-900 text-white text-xs font-semibold" onclick="navTo('е®үзҺҜжЈҖжҹҘ_ж•ҙж”№йҖҡзҹҘ_hazard_form.html?record=${id}&hazard=${h.id}')">ж•ҙж”№</button>`
            }
          </div>
        </div>
      `).join('');
      updateProgress();
      syncMobileLayout();
    }

    renderHazards();
  </script>
</body>
</html>
