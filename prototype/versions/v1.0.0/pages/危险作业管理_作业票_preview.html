<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>дҪңдёҡзҘЁйў„и§?/title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="mobile-layout.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    .glass { background: rgba(255,255,255,0.78); backdrop-filter: blur(18px); }
    .btn { transition: transform 0.2s ease; }
    .btn:active { transform: scale(0.95); }
    .ticket-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .ticket-table td, .ticket-table th { border: 1px solid #cbd5e1; padding: 6px 8px; vertical-align: top; }
    .ticket-table .label { background: #f8fafc; color: #64748b; width: 28%; white-space: nowrap; }
  </style>
</head>
<body class="bg-slate-100 text-slate-900 antialiased">
  <header class="mobile-header px-5 pb-4">
    <div class="flex items-center justify-between">
      <button class="btn w-10 h-10 rounded-2xl bg-white/90 border border-slate-200 shadow-[0_4px_12px_rgba(0,0,0,0.05)]"
              onclick="navBack('еҚұйҷ©дҪңдёҡз®ЎзҗҶ_з”іиҜ·_detail.html?type=' + currentType)">
        <i class="fa-solid fa-angle-left text-slate-700"></i>
      </button>
      <div class="text-sm font-semibold text-slate-900">дҪңдёҡзҘЁйў„и§?/div>
      <button class="btn w-10 h-10 rounded-2xl bg-slate-900 text-white"
              onclick="toast('еҺҹеһӢжј”зӨәпјҡеҜјеҮ?PDF / жү“еҚ°')">
        <i class="fa-solid fa-share-from-square"></i>
      </button>
    </div>
  </header>

  <div class="mobile-content pt-0 !px-4">
    <div class="bg-white rounded-2xl border border-slate-300 shadow-sm p-4 overflow-x-auto" id="ticketContent"></div>
    <div class="mt-3 text-xs text-slate-500 text-center">дёҺгҖҠеҚұйҷ©дҪңдёҡзҘЁгҖӢжЁЎжқҝдёҖиҮҙпјҢеҸҜжҢүзұ»еһӢеҲҮжҚўйў„и§Ҳ</div>
  </div>


  <script src="shared-mobile.js"></script>
  <script src="pc-permit-data.js"></script>
  <script>
    let currentType = new URLSearchParams(location.search).get('type') || 'hot_work';

    function renderTicket(type) {
      currentType = type;
      const cfg = PERMIT_TYPES[type];
      let html = `<div class="text-center font-bold text-base mb-3">${cfg.licenseTitle}</div>
        <div class="text-xs text-slate-500 mb-3 flex justify-between">
          <span>з”іиҜ·ж—¶й—ҙпј?026 е№?07 жң?08 ж—?/span><span>зј–еҸ·пјҡWP-20260708-001</span>
        </div>
        <table class="ticket-table"><tbody>`;
      html += `<tr><td class="label">з”іиҜ·дәәе‘ҳ</td><td>еј ж•Ҹ</td><td class="label">жүҖеұһйғЁй—?/td><td>е®үе…ЁзҺҜдҝқйғ?/td></tr>`;
      if (cfg.contentLabel) html += `<tr><td class="label">${cfg.contentLabel}</td><td colspan="3">пјҲзӨәдҫӢпјү</td></tr>`;
      if (cfg.locationLabel) html += `<tr><td class="label">${cfg.locationLabel}</td><td colspan="3">з”ҹдә§дёҖиҪҰй—ҙ</td></tr>`;
      html += `<tr><td class="label">дҪңдёҡиҙҹиҙЈдә?/td><td>зҺӢејә</td><td class="label">дҪңдёҡзӣ‘жҠӨдә?/td><td>й’ұеёҲеӮ…гҖҒжқҺжҳ?/td></tr>`;
      html += `<tr><td class="label">ж–Ҫе·ҘеҚ•дҪҚ</td><td colspan="3">з»ҙдҝ®зҸ?/td></tr>`;
      if (cfg.levelLabel) {
        html += `<tr><td class="label">${cfg.levelLabel}</td><td colspan="3">${cfg.levels.map(l => l.label).join(' / ')}</td></tr>`;
      }
      html += `<tr><td class="label">${cfg.planTimeLabel}</td><td colspan="3">2026-07-08 09:00 иҮ?2026-07-08 17:00</td></tr>`;
      if (cfg.workersLabel) {
        html += `<tr><td class="label">${cfg.workersLabel}</td><td colspan="3">иөөе·ҘпјҲWA-10293пј?/td></tr>`;
      }
      html += `<tr><td class="label">йЈҺйҷ©иҫЁиҜҶ</td><td colspan="3">${cfg.risks.join('гҖ?)}</td></tr>`;
      html += `</tbody></table>`;

      html += `<div class="text-xs font-semibold mt-4 mb-2">е®үе…ЁжҺӘж–Ҫ</div><table class="ticket-table"><thead>
        <tr><th style="width:36px">еәҸеҸ·</th><th>е®үе…ЁжҺӘж–Ҫ</th><th style="width:56px">зЎ®и®Ө</th></tr></thead><tbody>`;
      cfg.measures.forEach((m, i) => {
        html += `<tr><td>${i + 1}</td><td>${m}</td><td>ж¶үеҸҠ</td></tr>`;
      });
      html += `</tbody></table>`;

      html += `<div class="text-xs font-semibold mt-4 mb-2">е®Ўжү№ж„Ҹи§Ғ</div>`;
      cfg.approvals.forEach(a => {
        html += `<div class="text-xs border border-slate-200 rounded-lg p-2 mb-2">
          <div class="font-semibold">${a.node}${a.level ? 'пј? + a.level + 'пј? : ''}</div>
          <div class="text-slate-400 mt-2">е№?&nbsp; жң?&nbsp; ж—?&nbsp; ж—?&nbsp; еҲ?/div></div>`;
      });

      if (cfg.notes) {
        html += `<div class="text-[10px] text-slate-500 mt-3 leading-relaxed">жіЁпјҡ${cfg.notes.join('пј?)}</div>`;
      }

      qs('#ticketContent').innerHTML = html;
      qsa('[data-type-tab]').forEach(btn => {
        const active = btn.dataset.typeTab === type;
        btn.classList.toggle('bg-slate-900', active);
        btn.classList.toggle('text-white', active);
        btn.classList.toggle('bg-white', !active);
        btn.classList.toggle('text-slate-700', !active);
      });
    }

    const tabs = qs('#typeTabs');
    Object.entries(PERMIT_TYPES).forEach(([key, cfg]) => {
      const btn = document.createElement('button');
      btn.className = 'btn shrink-0 px-3 py-1.5 rounded-xl border border-slate-200 text-xs font-semibold';
      btn.dataset.typeTab = key;
      btn.textContent = cfg.name;
      btn.onclick = () => renderTicket(key);
      tabs.appendChild(btn);
    });

    renderTicket(currentType);
  </script>
</body>
</html>
