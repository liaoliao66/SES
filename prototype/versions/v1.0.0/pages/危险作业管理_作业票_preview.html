<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>作业票预览</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="_mobile_layout.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    .glass { background: rgba(255,255,255,0.78); backdrop-filter: blur(18px); }
    .btn { transition: transform 0.2s ease; }
    .btn:active { transform: scale(0.95); }
    .ticket-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .ticket-table td, .ticket-table th { border: 1px solid #cbd5e1; padding: 6px 8px; vertical-align: top; }
    .ticket-table .label { background: #f8fafc; color: #64748b; width: 28%; white-space: nowrap; }
  </style>
</head>
<body class="bg-slate-100 text-slate-900 antialiased">
  <header class="mobile-header px-5 pb-4">
    <div class="flex items-center justify-between">
      <button class="btn w-10 h-10 rounded-2xl bg-white/90 border border-slate-200 shadow-[0_4px_12px_rgba(0,0,0,0.05)]"
              onclick="navBack('危险作业管理_申请_detail.html?type=' + currentType)">
        <i class="fa-solid fa-angle-left text-slate-700"></i>
      </button>
      <div class="text-sm font-semibold text-slate-900">作业票预览</div>
      <button class="btn w-10 h-10 rounded-2xl bg-slate-900 text-white"
              onclick="toast('原型演示：导出 PDF / 打印')">
        <i class="fa-solid fa-share-from-square"></i>
      </button>
    </div>
  </header>

  <div class="mobile-content pt-0 !px-4">
    <div class="bg-white rounded-2xl border border-slate-300 shadow-sm p-4 overflow-x-auto" id="ticketContent"></div>
    <div class="mt-3 text-xs text-slate-500 text-center">与《危险作业票》模板一致，可按类型切换预览</div>
  </div>


  <script src="_shared_mobile.js"></script>
  <script src="_pc_permit_data.js"></script>
  <script>
    let currentType = new URLSearchParams(location.search).get('type') || 'hot_work';

    function renderTicket(type) {
      currentType = type;
      const cfg = PERMIT_TYPES[type];
      let html = `<div class="text-center font-bold text-base mb-3">${cfg.licenseTitle}</div>
        <div class="text-xs text-slate-500 mb-3 flex justify-between">
          <span>申请时间：2026 年 07 月 08 日</span><span>编号：WP-20260708-001</span>
        </div>
        <table class="ticket-table"><tbody>`;
      html += `<tr><td class="label">申请人员</td><td>张敏</td><td class="label">所属部门</td><td>安全环保部</td></tr>`;
      if (cfg.contentLabel) html += `<tr><td class="label">${cfg.contentLabel}</td><td colspan="3">（示例）</td></tr>`;
      if (cfg.locationLabel) html += `<tr><td class="label">${cfg.locationLabel}</td><td colspan="3">生产一车间</td></tr>`;
      html += `<tr><td class="label">作业负责人</td><td>王强</td><td class="label">作业监护人</td><td>钱师傅、李明</td></tr>`;
      html += `<tr><td class="label">施工单位</td><td colspan="3">维修班</td></tr>`;
      if (cfg.levelLabel) {
        html += `<tr><td class="label">${cfg.levelLabel}</td><td colspan="3">${cfg.levels.map(l => l.label).join(' / ')}</td></tr>`;
      }
      html += `<tr><td class="label">${cfg.planTimeLabel}</td><td colspan="3">2026-07-08 09:00 至 2026-07-08 17:00</td></tr>`;
      if (cfg.workersLabel) {
        html += `<tr><td class="label">${cfg.workersLabel}</td><td colspan="3">赵工（WA-10293）</td></tr>`;
      }
      html += `<tr><td class="label">风险辨识</td><td colspan="3">${cfg.risks.join('、')}</td></tr>`;
      html += `</tbody></table>`;

      html += `<div class="text-xs font-semibold mt-4 mb-2">安全措施</div><table class="ticket-table"><thead>
        <tr><th style="width:36px">序号</th><th>安全措施</th><th style="width:56px">确认</th></tr></thead><tbody>`;
      cfg.measures.forEach((m, i) => {
        html += `<tr><td>${i + 1}</td><td>${m}</td><td>涉及</td></tr>`;
      });
      html += `</tbody></table>`;

      html += `<div class="text-xs font-semibold mt-4 mb-2">审批意见</div>`;
      cfg.approvals.forEach(a => {
        html += `<div class="text-xs border border-slate-200 rounded-lg p-2 mb-2">
          <div class="font-semibold">${a.node}${a.level ? '（' + a.level + '）' : ''}</div>
          <div class="text-slate-400 mt-2">年 &nbsp; 月 &nbsp; 日 &nbsp; 时 &nbsp; 分</div></div>`;
      });

      if (cfg.notes) {
        html += `<div class="text-[10px] text-slate-500 mt-3 leading-relaxed">注：${cfg.notes.join('；')}</div>`;
      }

      qs('#ticketContent').innerHTML = html;
      qsa('[data-type-tab]').forEach(btn => {
        const active = btn.dataset.typeTab === type;
        btn.classList.toggle('bg-slate-900', active);
        btn.classList.toggle('text-white', active);
        btn.classList.toggle('bg-white', !active);
        btn.classList.toggle('text-slate-700', !active);
      });
    }

    const tabs = qs('#typeTabs');
    Object.entries(PERMIT_TYPES).forEach(([key, cfg]) => {
      const btn = document.createElement('button');
      btn.className = 'btn shrink-0 px-3 py-1.5 rounded-xl border border-slate-200 text-xs font-semibold';
      btn.dataset.typeTab = key;
      btn.textContent = cfg.name;
      btn.onclick = () => renderTicket(key);
      tabs.appendChild(btn);
    });

    renderTicket(currentType);
  </script>
</body>
</html>
