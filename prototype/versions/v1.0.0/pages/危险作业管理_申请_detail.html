<!DOCTYPE html>

<body class="bg-slate-50 text-slate-900 antialiased">

  <script src="shared-mobile.js"></script>

  <script>
    const type = new URLSearchParams(location.search).get('type') || 'hot_work';
    const cfg = PERMIT_TYPES[type];
    const listIndex = MOBILE_LIST_DATA.findIndex(d => d.type === type);
    const listItem = listIndex >= 0 ? MOBILE_LIST_DATA[listIndex] : MOBILE_LIST_DATA[0];

    qs('#typeLabel').textContent = cfg.licenseTitle;
    qs('#statusBadge').innerHTML = statusBadge(listItem.status);
    qs('#printBtn').onclick = () => navTo(`еҚұйҷ©дҪңдёҡз®ЎзҗҶ_дҪңдёҡзҘЁ_preview.html?type=${type}`);

    function detailRow(label, value) {
      return `<div class="rounded-2xl bg-slate-50 border border-slate-200 p-3">
        <div class="text-xs text-slate-500">${label}</div>
        <div class="mt-1 text-sm font-semibold text-slate-800">${value}</div>
      </div>`;
    }

    function section(title) {
      return `<div class="rounded-3xl bg-white border border-slate-200 shadow-[0_4px_12px_rgba(0,0,0,0.05)] p-4">`;
    }
    function sectionClose() { return `</div>`; }

    let html = '';

    // в”Җв”Җ еҹәжң¬дҝЎжҒҜ в”Җв”Җ
    html += section();
    html += `<div class="text-sm font-semibold text-slate-800 mb-3">еҹәжң¬дҝЎжҒҜ</div>
      <div class="grid grid-cols-2 gap-2">`;
    html += detailRow('з”іиҜ·зј–еҸ·', listItem.id);
    html += detailRow('з”іиҜ·еҗҚз§°', listItem.name);
    html += detailRow('з”іиҜ·дәәе‘ҳ', 'еј ж•Ҹ');
    html += detailRow('жүҖеұһйғЁй—?, 'е®үе…ЁзҺҜдҝқйғ?);
    if (cfg.contentLabel) {
      const sampleContent = {
        hot_work: 'з„ҠжҺҘжЈҖдҝ®пјҲз”ҹдә§дёҖиҪҰй—ҙи®ҫеӨҮз„ҠжҺҘпј?,
        high_altitude: 'и®ҫеӨҮжЈҖдҝ®пјҲд»“еӮЁеҢәеӨ–еўҷз»ҙдҝ®пјү',
        lifting: 'и®ҫеӨҮз§»дҪҚпјҲз ҒеӨҙеҢәеҗҠиЈ…дҪңдёҡпј?,
        confined_space: 'жұЎж°ҙжұ жё…зҗҶдҪңдё?,
        earthwork: 'з®ЎйҒ“ж•·и®ҫпјҲеҺӮеҢәдёңдҫ§пјү',
        temp_electricity: 'дёҙж—¶з”Ёз”өпјҲз»ҙдҝ®иҪҰй—ҙжҺҘзәҝпјү'
      };
      html += detailRow(cfg.contentLabel, sampleContent[type] || 'пјҲзӨәдҫӢеҶ…е®№пјү');
    }
    if (cfg.locationLabel) {
      html += detailRow(cfg.locationLabel, listItem.area);
    }
    html += detailRow('дҪңдёҡиҙҹиҙЈдә?, 'зҺӢејә');
    html += detailRow('дҪңдёҡзӣ‘жҠӨдә?, 'й’ұеёҲеӮ…гҖҒжқҺжҳ?);
    html += detailRow('ж–Ҫе·ҘеҚ•дҪҚ', 'з»ҙдҝ®зҸ?);
    if (cfg.levelLabel) {
      html += detailRow(cfg.levelLabel, cfg.levels[0].label);
    }
    html += `<div class="col-span-2 rounded-2xl bg-slate-50 border border-slate-200 p-3">
      <div class="text-xs text-slate-500">дҪңдёҡеҢәеҹҹ</div>
      <div class="mt-1 text-sm font-semibold text-slate-800">${listItem.area}</div>
    </div>`;
    html += `</div></div>`;

    // в”Җв”Җ йЈҺйҷ©иҫЁиҜҶз»“жһң в”Җв”Җ
    html += section();
    html += `<div class="text-sm font-semibold text-slate-800 mb-3">йЈҺйҷ©иҫЁиҜҶз»“жһң</div>
      <div class="flex flex-wrap gap-1.5">`;
    cfg.risks.forEach(r => {
      html += `<span class="inline-flex items-center gap-1 px-3 py-1.5 rounded-xl bg-rose-50 border border-rose-200 text-xs font-medium text-rose-700"><i class="fa-solid fa-triangle-exclamation text-[10px]"></i>${r}</span>`;
    });
    html += `</div></div>`;

    // в”Җв”Җ дҪңдёҡж—¶й—ҙ в”Җв”Җ
    html += section();
    html += `<div class="text-sm font-semibold text-slate-800 mb-3">${cfg.planTimeLabel}</div>
      <div class="grid grid-cols-2 gap-2">`;
    html += detailRow('ејҖе§Ӣж—¶й—?, '2026-07-08 09:00');
    html += detailRow('з»“жқҹж—¶й—ҙ', '2026-07-08 17:00');
    html += `</div></div>`;

    // в”Җв”Җ дҪңдёҡдәәе‘ҳдҝЎжҒҜпјҲд»…еҪ“жңү workersLabelпј?в”Җв”Җ
    if (cfg.workersLabel) {
      html += section();
      html += `<div class="text-sm font-semibold text-slate-800 mb-3">${cfg.workersLabel}</div>
        <div class="space-y-2">`;
      const workers = type === 'hot_work' ? [
        { name: 'иөөе·Ҙ', cert: 'WA-10293' },
        { name: 'еӯҷдјҹ', cert: 'WA-10456' }
      ] : type === 'high_altitude' ? [
        { name: 'е‘Ёжқ°', cert: 'GA-20341' },
        { name: 'жқҺжҳҺ', cert: 'GA-20789' }
      ] : [
        { name: 'иөөе·Ҙ', cert: 'WA-10293' }
      ];
      workers.forEach(w => {
        html += `<div class="flex items-center justify-between rounded-2xl bg-slate-50 border border-slate-200 px-3 py-2.5">
          <div class="flex items-center gap-2">
            <i class="fa-solid fa-user text-slate-400 text-xs"></i>
            <span class="text-sm font-medium text-slate-800">${w.name}</span>
          </div>
          <span class="text-xs text-slate-500">иҜҒд№Ұзј–еҸ·пј?{w.cert}</span>
        </div>`;
      });
      html += `</div></div>`;
    }

    // в”Җв”Җ е®үе…ЁжҺӘж–ҪзЎ®и®Ө в”Җв”Җ
    html += section();
    html += `<div class="text-sm font-semibold text-slate-800 mb-3">е®үе…ЁжҺӘж–ҪзЎ®и®Ө</div>
      <div class="space-y-2">`;
    cfg.measures.forEach((m, i) => {
      const isEven = i % 2 === 0;
      html += `<div class="rounded-2xl ${isEven ? 'bg-emerald-50/40 border-emerald-200' : 'bg-slate-50 border-slate-200'} border p-3">
        <div class="flex items-center justify-between mb-1">
          <span class="text-xs text-slate-500">з¬?${i + 1} жқ?/span>
          <span class="inline-flex items-center gap-1 text-xs font-semibold ${isEven ? 'text-emerald-700' : 'text-slate-500'}">
            <i class="fa-solid ${isEven ? 'fa-circle-check text-emerald-500' : 'fa-circle-minus text-slate-400'}"></i>
            ${isEven ? 'е·ІзЎ®и®? : 'еҫ…зЎ®и®?}
          </span>
        </div>
        <div class="text-xs text-slate-700 leading-relaxed">${m}</div>
      </div>`;
    });
    html += `</div></div>`;

    // в”Җв”Җ ж°”дҪ“жЈҖжөӢи®°еҪ•пјҲжңүйҷҗз©әй—ҙдё“з”Ёпј?в”Җв”Җ
    if (cfg.hasGasDetection) {
      html += section();
      html += `<div class="text-sm font-semibold text-slate-800 mb-3">жңүжҜ’жңүе®іж°”дҪ“жЈҖжөӢи®°еҪ?/div>
        <div class="overflow-x-auto">
          <table class="w-full text-xs border-collapse">
            <thead>
              <tr class="bg-slate-100">
                <th class="border border-slate-200 px-2 py-1.5 text-left font-medium text-slate-600">жЈҖжөӢйЎ№зӣ?/th>
                <th class="border border-slate-200 px-2 py-1.5 text-center font-medium text-slate-600">е…Ғи®ёиҢғеӣҙ</th>
                <th class="border border-slate-200 px-2 py-1.5 text-center font-medium text-slate-600">жЈҖжөӢеҖ?/th>
                <th class="border border-slate-200 px-2 py-1.5 text-center font-medium text-slate-600">з»“жһң</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td class="border border-slate-200 px-2 py-1.5 text-slate-700">зЎ«еҢ–ж°ўпјҲHвӮӮSпј?/td>
                <td class="border border-slate-200 px-2 py-1.5 text-center text-slate-500">пј?ppm</td>
                <td class="border border-slate-200 px-2 py-1.5 text-center font-medium text-slate-800">0.5ppm</td>
                <td class="border border-slate-200 px-2 py-1.5 text-center"><span class="px-1.5 py-0.5 rounded-full bg-emerald-50 text-emerald-700 border border-emerald-200 font-medium">еҗҲж ј</span></td>
              </tr>
              <tr>
                <td class="border border-slate-200 px-2 py-1.5 text-slate-700">дёҖж°§еҢ–зўіпјҲCOпј?/td>
                <td class="border border-slate-200 px-2 py-1.5 text-center text-slate-500">пј?00ppm</td>
                <td class="border border-slate-200 px-2 py-1.5 text-center font-medium text-slate-800">12ppm</td>
                <td class="border border-slate-200 px-2 py-1.5 text-center"><span class="px-1.5 py-0.5 rounded-full bg-emerald-50 text-emerald-700 border border-emerald-200 font-medium">еҗҲж ј</span></td>
              </tr>
              <tr>
                <td class="border border-slate-200 px-2 py-1.5 text-slate-700">ж°§ж°”пјҲOвӮӮпјү</td>
                <td class="border border-slate-200 px-2 py-1.5 text-center text-slate-500">19.5%-23.5%</td>
                <td class="border border-slate-200 px-2 py-1.5 text-center font-medium text-slate-800">20.8%</td>
                <td class="border border-slate-200 px-2 py-1.5 text-center"><span class="px-1.5 py-0.5 rounded-full bg-emerald-50 text-emerald-700 border border-emerald-200 font-medium">еҗҲж ј</span></td>
              </tr>
              <tr>
                <td class="border border-slate-200 px-2 py-1.5 text-slate-700">еҸҜзҮғж°”пјҲLELпј?/td>
                <td class="border border-slate-200 px-2 py-1.5 text-center text-slate-500">пј?0% LEL</td>
                <td class="border border-slate-200 px-2 py-1.5 text-center font-medium text-slate-800">3%</td>
                <td class="border border-slate-200 px-2 py-1.5 text-center"><span class="px-1.5 py-0.5 rounded-full bg-emerald-50 text-emerald-700 border border-emerald-200 font-medium">еҗҲж ј</span></td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="mt-2 text-xs text-slate-500">жЈҖжөӢдәәпјҡжқҺжҳ?В· жЈҖжөӢж—¶й—ҙпјҡ2026-07-08 08:30</div>
      </div>`;
    }

    // в”Җв”Җ йҷ„д»¶ в”Җв”Җ
    html += section();
    html += `<div class="text-sm font-semibold text-slate-800 mb-3">йҷ„д»¶иө„ж–ҷ</div>
      <div class="space-y-2">
        <div class="flex items-center justify-between rounded-2xl bg-slate-50 border border-slate-200 px-3 py-2.5">
          <div class="flex items-center gap-2">
            <i class="fa-regular fa-image text-slate-400"></i>
            <span class="text-sm text-slate-700">зҺ°еңәз…§зүҮ_01.jpg</span>
          </div>
          <i class="fa-solid fa-eye text-slate-400 text-xs"></i>
        </div>
        <div class="flex items-center justify-between rounded-2xl bg-slate-50 border border-slate-200 px-3 py-2.5">
          <div class="flex items-center gap-2">
            <i class="fa-regular fa-file-pdf text-slate-400"></i>
            <span class="text-sm text-slate-700">дҪңдёҡж–№жЎҲ.pdf</span>
          </div>
          <i class="fa-solid fa-eye text-slate-400 text-xs"></i>
        </div>
        <div class="flex items-center justify-between rounded-2xl bg-slate-50 border border-slate-200 px-3 py-2.5">
          <div class="flex items-center gap-2">
            <i class="fa-regular fa-file-lines text-slate-400"></i>
            <span class="text-sm text-slate-700">йЈҺйҷ©иҫЁиҜҶиЎ?docx</span>
          </div>
          <i class="fa-solid fa-eye text-slate-400 text-xs"></i>
        </div>
      </div></div>`;

    // в”Җв”Җ е®Ўжү№и®°еҪ• в”Җв”Җ
    html += section();
    html += `<div class="text-sm font-semibold text-slate-800 mb-3">е®Ўжү№и®°еҪ•</div>
      <div class="space-y-0">`;
    cfg.approvals.forEach((a, i) => {
      const isFirst = i === 0;
      const approverNames = ['еј дё»з®?, 'жқҺз»Ҹзҗ?, 'зҺӢжҖ?];
      const currentStatus = isFirst ? 'еҫ…е®Ўжү? : 'жңӘејҖе§?;
      const currentColor = isFirst ? 'bg-amber-500' : 'bg-slate-300';
      html += `<div class="flex items-start gap-3 ${i > 0 ? 'mt-4' : ''}">
        <div class="flex flex-col items-center">
          <div class="w-3 h-3 mt-0.5 rounded-full ${currentColor} shrink-0 border-2 border-white shadow-sm"></div>
          ${i < cfg.approvals.length - 1 ? `<div class="w-0.5 h-8 bg-slate-200 mt-0.5"></div>` : ''}
        </div>
        <div class="flex-1">
          <div class="flex items-center justify-between">
            <div class="text-sm font-semibold text-slate-800">${a.node}${a.level ? '<span class="text-xs text-slate-500 ml-1 font-normal">пј? + a.level + 'пј?/span>' : ''}</div>
            <span class="text-[11px] px-2 py-0.5 rounded-full ${isFirst ? 'bg-amber-50 text-amber-700 border border-amber-200' : 'bg-slate-50 text-slate-500 border border-slate-200'}">${currentStatus}</span>
          </div>
          <div class="mt-1 text-xs text-slate-500">е®Ўжү№дәәпјҡ${approverNames[i]} В· е®үе…ЁзҺҜдҝқйғ?/div>
          ${isFirst ? '<div class="mt-1"><button class="btn inline-flex items-center gap-1 px-3 py-1.5 rounded-lg bg-amber-50 border border-amber-200 text-xs font-medium text-amber-700" onclick="toast(\'еҺҹеһӢжј”зӨәпјҡе®Ўжү№ж“ҚдҪң\')"><i class="fa-solid fa-pen-to-square"></i>еҺ»е®Ўжү?/button></div>' : ''}
        </div>
      </div>`;
    });
    html += `</div></div>`;

    // в”Җв”Җ еӨҮжіЁпјҲеҰӮжңүпјү в”Җв”Җ
    if (cfg.notes && cfg.notes.length) {
      html += section();
      html += `<div class="text-sm font-semibold text-slate-800 mb-3">еӨҮжіЁ</div>
        <ul class="space-y-1.5">`;
      cfg.notes.forEach(n => {
        html += `<li class="flex items-start gap-2 text-xs text-slate-600">
          <i class="fa-regular fa-note-sticky text-slate-400 mt-0.5 shrink-0"></i>
          <span>${n}</span>
        </li>`;
      });
      html += `</ul></div>`;
    }

    qs('#detailContent').innerHTML = html;
  </script>
</body>
</html>
