  <style></style>

<body class="bg-slate-50 text-slate-900 antialiased">

  <div class="mobile-content space-y-3" style="padding-bottom: 6rem;">

        <div>

          <div class="text-xs text-slate-500 mt-1">检查类型：综合检查 · 2026-07-07</div>
        </div>
        <span class="px-2.5 py-1 rounded-full text-[11px] font-semibold bg-emerald-50 text-emerald-700 border border-emerald-200">正常</span>
      </div>
      <div class="mt-3 text-xs text-slate-600 leading-relaxed">
        说明：现场环境良好，安全通道畅通（示例）。

      <div class="mt-4 flex items-center justify-end gap-2">

    <!-- Card 2 abnormal -->

        </div>
        <span class="px-2.5 py-1 rounded-full text-[11px] font-semibold bg-amber-50 text-amber-700 border border-amber-200">异常</span>
      </div>
      <div class="mt-3 grid grid-cols-2 gap-2 text-xs">
        <div class="rounded-2xl bg-slate-50 border border-slate-200 p-3">
          <div class="text-slate-500">整改责任人</div>
          <div class="mt-1 font-semibold text-slate-800">王强</div>
        </div>
        <div class="rounded-2xl bg-slate-50 border border-slate-200 p-3">
          <div class="text-slate-500">整改截止</div>
          <div class="mt-1 font-semibold text-slate-800">2026-07-10</div>
        </div>
      </div>
      <div class="mt-3 text-xs text-slate-600">隐患项目：2 条（来自隐患库 + 手动录入）</div>

  <!-- bottom: 新增入口 -->
  <div class="fixed bottom-0 left-0 right-0 z-40 px-5 pb-6">
    <button class="btn w-full py-3 rounded-2xl bg-slate-900 text-white text-sm font-semibold shadow-[0_8px_24px_rgba(0,0,0,0.18)]"
            onclick="navTo('安环检查_检查记录_form.html')">
      <i class="fa-solid fa-plus mr-2"></i>新增检查记录
    </button>
  </div>

  <script>// Shared helpers for mobile prototype pages (vanilla JS, no build).
function qs(sel, root) { return (root || document).querySelector(sel); }
function qsa(sel, root) { return Array.from((root || document).querySelectorAll(sel)); }

function toast(message) {
  const el = document.createElement('div');
  el.className = 'fixed left-1/2 -translate-x-1/2 bottom-24 z-[999] px-4 py-2 rounded-2xl text-sm font-medium text-white bg-slate-900/90 shadow-[0_8px_24px_rgba(0,0,0,0.18)]';
  el.textContent = message;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 250ms ease'; }, 1200);
  setTimeout(() => el.remove(), 1700);
}

function navTo(page) {
  window.location.href = page;
}

function navBack(fallback) {
  if (history.length > 1) history.back();
  else if (fallback) navTo(fallback);
}

/** 同步 fixed 顶栏高度，避免内容被遮挡 */
function syncMobileLayout() {
  const header = document.querySelector('.mobile-header');
  if (header) {
    document.documentElement.style.setProperty('--mobile-header-h', header.offsetHeight + 'px');
  }
}

if (typeof document !== 'undefined') {
  document.addEventListener('DOMContentLoaded', syncMobileLayout);
  window.addEventListener('resize', syncMobileLayout);
}

function setActiveTab(tabId) {
  const items = qsa('[data-tab]');
  items.forEach(i => {
    const active = i.dataset.tab === tabId;
    i.classList.toggle('text-slate-900', active);
    i.classList.toggle('text-slate-500', !active);
    const dot = i.querySelector('[data-dot]');
    if (dot) dot.classList.toggle('opacity-100', active);
    if (dot) dot.classList.toggle('opacity-0', !active);
  });
}

</script>
</body>
</html>
