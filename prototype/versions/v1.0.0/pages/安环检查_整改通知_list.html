<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>整改通知</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="mobile-layout.css">
  <style>
/* App 端通用布局 — 避免 fixed 顶栏遮挡内容 */
.mobile-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 40;
  padding-top: 3rem;
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid #e2e8f0;
}

.mobile-content {
  padding-top: var(--mobile-header-h, 11.5rem);
  padding-bottom: 1.5rem;
  padding-left: 1.25rem;
  padding-right: 1.25rem;
}

.hide-scrollbar::-webkit-scrollbar { display: none; }
.hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

</style>
  
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    .btn { transition: transform 0.2s ease; }
    .btn:active { transform: scale(0.95); }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
  <header class="mobile-header px-5 pb-4">
    <div class="flex items-center justify-between">
      <button class="btn w-10 h-10 rounded-2xl bg-white/90 border border-slate-200 shadow-[0_4px_12px_rgba(0,0,0,0.05)]"
              onclick="navBack('app_home.html')">
        <i class="fa-solid fa-angle-left text-slate-700"></i>
      </button>
      <div class="text-sm font-semibold text-slate-900">整改通知</div>
      <div class="w-10"></div>
    </div>
    <div class="mt-2 text-xs text-slate-500">由异常检查提交后自动创建并发起审核；整改责任人在审批过程中填写</div>
    <div class="mt-3 flex items-center gap-2 overflow-x-auto hide-scrollbar" id="tabBar">
      <button class="tab-btn btn shrink-0 px-3 py-2 rounded-xl bg-slate-900 text-white text-xs font-semibold" data-tab="all">全部</button>
      <button class="tab-btn btn shrink-0 px-3 py-2 rounded-xl bg-white border border-slate-200 text-xs text-slate-700" data-tab="pending">待整改</button>
      <button class="tab-btn btn shrink-0 px-3 py-2 rounded-xl bg-white border border-slate-200 text-xs text-slate-700" data-tab="review">待复核</button>
      <button class="tab-btn btn shrink-0 px-3 py-2 rounded-xl bg-white border border-slate-200 text-xs text-slate-700" data-tab="done">已复核</button>
    </div>
  </header>

  <main class="mobile-content space-y-3" id="listRoot"></main>


  <script>// Shared helpers for mobile prototype pages (vanilla JS, no build).
function qs(sel, root) { return (root || document).querySelector(sel); }
function qsa(sel, root) { return Array.from((root || document).querySelectorAll(sel)); }

function toast(message) {
  const el = document.createElement('div');
  el.className = 'fixed left-1/2 -translate-x-1/2 bottom-24 z-[999] px-4 py-2 rounded-2xl text-sm font-medium text-white bg-slate-900/90 shadow-[0_8px_24px_rgba(0,0,0,0.18)]';
  el.textContent = message;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 250ms ease'; }, 1200);
  setTimeout(() => el.remove(), 1700);
}

function navTo(page) {
  window.location.href = page;
}

function navBack(fallback) {
  if (history.length > 1) history.back();
  else if (fallback) navTo(fallback);
}

/** 同步 fixed 顶栏高度，避免内容被遮挡 */
function syncMobileLayout() {
  const header = document.querySelector('.mobile-header');
  if (header) {
    document.documentElement.style.setProperty('--mobile-header-h', header.offsetHeight + 'px');
  }
}

if (typeof document !== 'undefined') {
  document.addEventListener('DOMContentLoaded', syncMobileLayout);
  window.addEventListener('resize', syncMobileLayout);
}

function setActiveTab(tabId) {
  const items = qsa('[data-tab]');
  items.forEach(i => {
    const active = i.dataset.tab === tabId;
    i.classList.toggle('text-slate-900', active);
    i.classList.toggle('text-slate-500', !active);
    const dot = i.querySelector('[data-dot]');
    if (dot) dot.classList.toggle('opacity-100', active);
    if (dot) dot.classList.toggle('opacity-0', !active);
  });
}

</script>
  <script>
    const DATA = [
      { id: 1, title: '专项检查（仓储区）', deadline: '2026-07-10', owner: '王强', hazards: 2, status: 'pending', statusLabel: '待整改', badge: 'bg-amber-50 text-amber-700 border-amber-200' },
      { id: 2, title: '日常巡检（码头区）', deadline: '2026-07-12', owner: '李明', hazards: 1, status: 'review', statusLabel: '待复核', badge: 'bg-blue-50 text-blue-700 border-blue-200' },
      { id: 3, title: '综合检查（生产一车间）', deadline: '2026-07-05', owner: '赵工', hazards: 3, status: 'done', statusLabel: '已复核', badge: 'bg-emerald-50 text-emerald-700 border-emerald-200' }
    ];

    function renderList(tab) {
      const list = tab === 'all' ? DATA : DATA.filter(d => d.status === tab);
      qs('#listRoot').innerHTML = list.length ? list.map(item => `
        <div class="rounded-3xl bg-white border border-slate-200 shadow-[0_4px_12px_rgba(0,0,0,0.05)] p-4" data-status="${item.status}">
          <div class="flex items-start justify-between gap-2">
            <div class="min-w-0">
              <div class="text-sm font-semibold text-slate-900">${item.title}</div>
              <div class="text-xs text-slate-500 mt-1">整改截止：${item.deadline} · 责任人：${item.owner}</div>
            </div>
            <span class="shrink-0 px-2.5 py-1 rounded-full text-[11px] font-semibold border ${item.badge}">${item.statusLabel}</span>
          </div>
          <div class="mt-3 text-xs text-slate-600">隐患项目：${item.hazards} 条${item.status === 'pending' ? ' · 审核已自动发起' : ''}</div>
          <div class="mt-4 flex justify-end gap-2 flex-wrap">
            <button class="btn px-3 py-2 rounded-2xl bg-white border border-slate-200 text-xs font-semibold text-slate-700"
                    onclick="navTo('安环检查_整改通知_detail.html?id=${item.id}')">查看</button>
            ${item.status !== 'done' ? `<button class="btn px-3 py-2 rounded-2xl bg-slate-900 text-white text-xs font-semibold"
                    onclick="navTo('安环检查_整改通知_rectify.html?id=${item.id}')">整改</button>` : ''}
            <button class="btn px-3 py-2 rounded-2xl bg-rose-50 border border-rose-200 text-xs font-semibold text-rose-700"
                    onclick="if(confirm('确认删除该整改通知？')) toast('已删除（原型）')">删除</button>
          </div>
        </div>
      `).join('') : `<div class="text-center text-sm text-slate-500 py-12">暂无数据</div>`;
      syncMobileLayout();
    }

    qsa('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        qsa('.tab-btn').forEach(b => {
          const active = b === btn;
          b.className = 'tab-btn btn shrink-0 px-3 py-2 rounded-xl text-xs font-semibold ' +
            (active ? 'bg-slate-900 text-white' : 'bg-white border border-slate-200 text-slate-700');
        });
        renderList(btn.dataset.tab);
      });
    });

    renderList('all');
  </script>
</body>
</html>
