<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>违章登记</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="_mobile_layout.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    .glass { background: rgba(255,255,255,0.78); backdrop-filter: blur(18px); }
    .btn { transition: transform 0.2s ease; }
    .btn:active { transform: scale(0.95); }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
  <header class="mobile-header px-5 pb-4">
    <div class="flex items-center justify-between">
      <button class="btn w-10 h-10 rounded-2xl bg-white/90 border border-slate-200 shadow-[0_4px_12px_rgba(0,0,0,0.05)]"
              onclick="navBack('app_home.html')">
        <i class="fa-solid fa-angle-left text-slate-700"></i>
      </button>
      <div class="text-sm font-semibold text-slate-900">违章登记</div>
      <div class="w-10"></div>
    </div>
  </header>

  <div class="mobile-content space-y-3" style="padding-bottom: 6rem;">
    <div class="rounded-3xl bg-white border border-slate-200 shadow-[0_4px_12px_rgba(0,0,0,0.05)] p-4">
      <div class="flex items-start justify-between">
        <div>
          <div class="text-sm font-semibold text-slate-900">未佩戴安全帽</div>
          <div class="text-xs text-slate-500 mt-1">2026-07-06 · 生产一车间 · 李某</div>
        </div>
        <span class="px-2.5 py-1 rounded-full text-[11px] font-semibold bg-amber-50 text-amber-700 border border-amber-200">待审批</span>
      </div>
      <div class="mt-4 flex justify-end gap-2">
        <button class="btn px-3 py-2 rounded-2xl bg-white border border-slate-200 text-xs font-semibold text-slate-700" onclick="toast('原型演示：查看')">查看</button>
        <button class="btn px-3 py-2 rounded-2xl bg-white border border-slate-200 text-xs font-semibold text-slate-700" onclick="toast('原型演示：编辑')">编辑</button>
        <button class="btn px-3 py-2 rounded-2xl bg-amber-50 border border-amber-200 text-xs font-semibold text-amber-700" onclick="toast('原型演示：发起审核')">发起审核</button>
      </div>
    </div>
  </div>


  <!-- bottom: 新增入口 -->
  <div class="fixed bottom-0 left-0 right-0 z-40 px-5 pb-6">
    <button class="btn w-full py-3 rounded-2xl bg-slate-900 text-white text-sm font-semibold shadow-[0_8px_24px_rgba(0,0,0,0.18)]"
            onclick="toast('原型演示：新增违章登记')">
      <i class="fa-solid fa-plus mr-2"></i>新增违章登记
    </button>
  </div>

  <script src="_shared_mobile.js"></script>
</body>
</html>
