<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SES 原型预览（App + PC）</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#0f172a',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    .glass { background: rgba(255,255,255,0.75); backdrop-filter: blur(18px); }
    .phone {
      width: 390px; height: 844px;
      border: 1px solid #e5e7eb; border-radius: 48px;
      box-shadow: 0 0 20px rgba(0,0,0,0.10);
      background: #0b1220;
      position: relative;
      overflow: hidden;
    }
    .island {
      position: absolute;
      top: 14px; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 32px;
      border-radius: 999px;
      background: rgba(0,0,0,0.65);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
      z-index: 20;
    }
    .phone iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: white;
      border-radius: 48px;
    }
  </style>
</head>
<body class="bg-gradient-to-b from-slate-50 to-slate-100 text-slate-900 antialiased">
  <div class="max-w-7xl mx-auto px-6 py-10">
    <div class="flex items-start justify-between gap-6">
      <div>
        <div class="inline-flex items-center gap-2 rounded-2xl px-4 py-2 bg-white shadow-[0_4px_12px_rgba(0,0,0,0.05)]">
          <i class="fa-solid fa-shield-halved text-slate-700"></i>
          <span class="text-sm font-semibold text-slate-700">SES 安环监测</span>
          <span class="text-xs text-slate-500">原型预览</span>
          <span class="ml-auto inline-flex items-center gap-1 rounded-full bg-slate-800 px-3 py-0.5 text-xs font-semibold text-white">v1.0.0</span>
        </div>
        <h1 class="mt-5 text-3xl font-semibold tracking-tight text-slate-900">App 端 + PC 端原型</h1>
        <p class="mt-2 text-slate-600 leading-relaxed max-w-2xl">
          覆盖：安环检查、危险作业（移动端）与安环门户/危险作业（PC）。违章管理原型已迁至 <a class="text-sky-700 underline" href="../v1.1.0/index.html" target="_blank" rel="noreferrer">v1.1.0</a>。
        </p>
      </div>
      <a class="hidden md:inline-flex items-center gap-2 rounded-xl px-4 py-2 bg-slate-900 text-white shadow-[0_8px_24px_rgba(0,0,0,0.12)] hover:opacity-95 transition"
         href="../../docs/安环监测/prd_pc_危险作业管理.md" target="_blank" rel="noreferrer">
        <i class="fa-regular fa-file-lines"></i>
        <span>PC 端 PRD</span>
      </a>
      <a class="hidden md:inline-flex items-center gap-2 rounded-xl px-4 py-2 bg-white border border-slate-200 text-slate-800 shadow-[0_4px_12px_rgba(0,0,0,0.05)] hover:opacity-95 transition"
         href="../../docs/安环监测/prd.md" target="_blank" rel="noreferrer">
        <i class="fa-regular fa-file-lines"></i>
        <span>查看 PRD</span>
      </a>
    </div>

    <div class="mt-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
      <!-- Mobile Preview -->
      <div class="lg:col-span-5">
        <div class="flex items-center justify-between">
          <h2 class="text-lg font-semibold text-slate-900">📱 App 端预览</h2>
          <button id="btnOpenMobile"
                  class="btn inline-flex items-center gap-2 rounded-xl px-3 py-2 bg-white shadow-[0_4px_12px_rgba(0,0,0,0.05)] hover:shadow-[0_8px_24px_rgba(0,0,0,0.08)] transition">
            <i class="fa-solid fa-up-right-from-square text-slate-600"></i>
            <span class="text-sm font-medium">新窗口打开</span>
          </button>
        </div>

        <div class="mt-4 flex flex-col gap-4">
          <div class="phone mx-auto">
            <div class="island"></div>
            <iframe id="mobileFrame" title="mobile" src="pages/app_home.html"></iframe>
          </div>
          <div class="glass rounded-2xl border border-slate-200 shadow-[0_4px_12px_rgba(0,0,0,0.05)] p-4">
            <div class="flex items-center justify-between">
              <div class="text-sm font-semibold text-slate-800">移动端页面</div>
              <div class="text-xs text-slate-500">点击即可在手机壳中预览</div>
            </div>
            <div class="mt-3 grid grid-cols-1 sm:grid-cols-2 gap-2">
              <button class="mobileLink rounded-xl px-3 py-2 bg-white border border-slate-200 text-left hover:bg-slate-50 transition ring-2 ring-slate-300" data-page="app_home.html">
                <div class="text-sm font-semibold text-slate-800">功能入口（平铺）</div>
                <div class="text-xs text-slate-500">检查记录 · 整改通知 · 危险作业</div>
              </button>
              <button class="mobileLink rounded-xl px-3 py-2 bg-white border border-slate-200 text-left hover:bg-slate-50 transition" data-page="安环检查_检查记录_list.html">
                <div class="text-sm font-semibold text-slate-800">检查记录（列表）</div>
                <div class="text-xs text-slate-500">新增/查看/编辑/删除</div>
              </button>
              <button class="mobileLink rounded-xl px-3 py-2 bg-white border border-slate-200 text-left hover:bg-slate-50 transition" data-page="安环检查_检查记录_form.html">
                <div class="text-sm font-semibold text-slate-800">新增检查记录</div>
                <div class="text-xs text-slate-500">异常提交自动发起审核 · 隐患库单选添加</div>
              </button>
              <button class="mobileLink rounded-xl px-3 py-2 bg-white border border-slate-200 text-left hover:bg-slate-50 transition" data-page="安环检查_整改通知_list.html">
                <div class="text-sm font-semibold text-slate-800">整改通知（列表）</div>
                <div class="text-xs text-slate-500">全部/待整改/待复核/已复核</div>
              </button>
              <button class="mobileLink rounded-xl px-3 py-2 bg-white border border-slate-200 text-left hover:bg-slate-50 transition" data-page="安环检查_整改通知_detail.html?id=1">
                <div class="text-sm font-semibold text-slate-800">整改通知 · 查看</div>
                <div class="text-xs text-slate-500">检查信息 + 隐患列表（只读）</div>
              </button>
              <button class="mobileLink rounded-xl px-3 py-2 bg-white border border-slate-200 text-left hover:bg-slate-50 transition" data-page="安环检查_整改通知_rectify.html?id=1">
                <div class="text-sm font-semibold text-slate-800">整改通知 · 整改</div>
                <div class="text-xs text-slate-500">审批中填写整改 · 无需手动发起审批</div>
              </button>
              <button class="mobileLink rounded-xl px-3 py-2 bg-white border border-slate-200 text-left hover:bg-slate-50 transition" data-page="安环检查_整改通知_hazard_form.html?record=1&hazard=h1">
                <div class="text-sm font-semibold text-slate-800">编辑隐患整改</div>
                <div class="text-xs text-slate-500">整改说明 · 照片 · 附件</div>
              </button>
              <a class="rounded-xl px-3 py-2 bg-amber-50 border border-amber-200 text-left hover:bg-amber-100 transition block no-underline" href="../v1.1.0/index.html" target="_blank" rel="noreferrer">
                <div class="text-sm font-semibold text-slate-800">违章管理（已迁至 v1.1.0）</div>
                <div class="text-xs text-slate-500">新窗口打开 v1.1.0 企微 H5 入口</div>
              </a>
              <button class="mobileLink rounded-xl px-3 py-2 bg-white border border-slate-200 text-left hover:bg-slate-50 transition" data-page="危险作业管理_申请_list.html">
                <div class="text-sm font-semibold text-slate-800">危险作业申请（列表）</div>
                <div class="text-xs text-slate-500">6 种类型 · 发起审批/导出作业票</div>
              </button>
              <button class="mobileLink rounded-xl px-3 py-2 bg-white border border-slate-200 text-left hover:bg-slate-50 transition" data-page="危险作业管理_申请_form.html">
                <div class="text-sm font-semibold text-slate-800">新增危险作业申请</div>
                <div class="text-xs text-slate-500">动态表单 · 负责人/监护人多选</div>
              </button>
              <button class="mobileLink rounded-xl px-3 py-2 bg-white border border-slate-200 text-left hover:bg-slate-50 transition" data-page="危险作业管理_申请_detail.html?type=hot_work">
                <div class="text-sm font-semibold text-slate-800">申请详情</div>
                <div class="text-xs text-slate-500">措施/审批记录/作业票入口</div>
              </button>
              <button class="mobileLink rounded-xl px-3 py-2 bg-white border border-slate-200 text-left hover:bg-slate-50 transition" data-page="危险作业管理_作业票_preview.html?type=hot_work">
                <div class="text-sm font-semibold text-slate-800">作业票预览</div>
                <div class="text-xs text-slate-500">6 种许可证模板 · 可导出</div>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Desktop Preview -->
      <div class="lg:col-span-7">
        <div class="flex items-center justify-between">
          <h2 class="text-lg font-semibold text-slate-900">💻 PC 端预览</h2>
        </div>

        <div class="mt-4 glass rounded-2xl border border-slate-200 shadow-[0_4px_12px_rgba(0,0,0,0.05)] overflow-hidden">
          <div class="p-6">
            <div class="text-sm font-semibold text-slate-800">统一入口</div>
            <div class="text-xs text-slate-500 mt-1 leading-relaxed">
              PC 端仅保留一个预览入口：进入「安环门户」后，可通过左侧菜单进入危险作业管理等子模块。
            </div>
            <a class="mt-5 inline-flex items-center gap-2 rounded-xl px-5 py-3 bg-slate-900 text-white text-sm font-semibold shadow-[0_8px_24px_rgba(0,0,0,0.12)] hover:opacity-95 transition"
               href="pages/pc_安环门户_home.html" target="_blank" rel="noreferrer">
              <i class="fa-solid fa-desktop"></i>
              打开 PC 端原型
            </a>
          </div>
        </div>

        <div class="mt-4 text-xs text-slate-500 leading-relaxed">
          提示：移动端页面之间也都做了可点击跳转（返回/新增/处理/整改/审批/导出）。
        </div>
      </div>
    </div>
  </div>
  <script>
    const mobileFrame = document.getElementById('mobileFrame');
    const links = Array.from(document.querySelectorAll('.mobileLink'));
    const btnOpenMobile = document.getElementById('btnOpenMobile');

    function setMobilePage(page) {
      mobileFrame.src = 'pages/' + page;
      btnOpenMobile.onclick = () => window.open('pages/' + page, '_blank', 'noreferrer');
      links.forEach(l => l.classList.toggle('ring-2', l.dataset.page === page));
      links.forEach(l => l.classList.toggle('ring-slate-300', l.dataset.page === page));
    }

    links.forEach(btn => btn.addEventListener('click', () => setMobilePage(btn.dataset.page)));
    setMobilePage('app_home.html');
  </script>
</body>
</html>
